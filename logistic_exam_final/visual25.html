<!DOCTYPE html>
<html lang="en" translate="no" class="notranslate">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="google" content="notranslate">
  <meta name="robots" content="noindex">
  <title>Logistics Visual 25 Exam</title>
  <style>
    :root {
      --ink: #142126;
      --soft: #eff5f0;
      --paper: #fffdf8;
      --line: #d7ded8;
      --muted: #64716d;
      --green: #136f63;
      --blue: #2c5f87;
      --clay: #b65d35;
      --danger: #a33428;
      --ok: #16784f;
      --shadow: 0 16px 38px rgba(28, 42, 39, .16);
    }

    * { box-sizing: border-box; }

    html,
    body {
      min-height: 100%;
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(255,255,255,.82), rgba(255,255,255,0) 340px),
        var(--soft);
      font-family: Arial, Helvetica, sans-serif;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      overscroll-behavior-y: contain;
    }

    button,
    input {
      font: inherit;
    }

    input {
      user-select: text;
      -webkit-user-select: text;
    }

    img {
      pointer-events: none;
      -webkit-user-drag: none;
    }

    .app {
      width: min(100%, 820px);
      min-height: 100svh;
      margin: 0 auto;
      padding: max(12px, env(safe-area-inset-top)) 12px max(22px, env(safe-area-inset-bottom));
    }

    .start,
    .finished {
      min-height: calc(100svh - 36px);
      display: grid;
      align-content: center;
      gap: 14px;
    }

    .start-panel,
    .finish-panel {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .start-art {
      min-height: 178px;
      display: grid;
      align-content: end;
      padding: 18px;
      color: #fff;
      background:
        linear-gradient(180deg, rgba(11, 37, 35, .08), rgba(11, 37, 35, .78)),
        url("../logistic_exam/images/logistics/warehouse_scene_3.jpg") center / cover;
    }

    .start-art h1,
    .finish-panel h1 {
      margin: 0;
      font-size: clamp(30px, 9vw, 48px);
      line-height: .98;
      letter-spacing: 0;
    }

    .start-art p,
    .finish-panel p {
      margin: 10px 0 0;
      font-size: 15px;
      line-height: 1.45;
    }

    .start-form,
    .finish-body {
      display: grid;
      gap: 13px;
      padding: 16px;
    }

    .warning {
      border: 1px solid #efc184;
      border-radius: 8px;
      padding: 12px;
      background: #fff4df;
      color: #593900;
      font-size: 14px;
      line-height: 1.4;
      font-weight: 800;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label,
    .checkrow {
      font-size: 14px;
      line-height: 1.35;
      font-weight: 900;
    }

    .field input {
      width: 100%;
      min-height: 48px;
      padding: 12px;
      border: 1px solid #b9c9c3;
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      outline: none;
    }

    .field input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(19, 111, 99, .15);
    }

    .checkrow {
      display: grid;
      grid-template-columns: 22px 1fr;
      gap: 9px;
      align-items: start;
    }

    .checkrow input {
      width: 20px;
      height: 20px;
      margin: 0;
      accent-color: var(--green);
    }

    .primary {
      min-height: 48px;
      border: 0;
      border-radius: 8px;
      padding: 12px 16px;
      background: var(--green);
      color: #fff;
      font-weight: 900;
      letter-spacing: 0;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 8;
      display: grid;
      gap: 8px;
      padding: 9px 0 11px;
      background: linear-gradient(180deg, var(--soft) 76%, rgba(239,245,240,0));
    }

    .toprow {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .title {
      margin: 0;
      font-size: 16px;
      line-height: 1.1;
      font-weight: 900;
    }

    .counter {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }

    .progress {
      height: 8px;
      overflow: hidden;
      border: 1px solid #c7d5ce;
      border-radius: 999px;
      background: #dbe8e2;
    }

    .progress span {
      display: block;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--green), var(--blue), var(--clay));
      transition: width .2s ease;
    }

    .task-shell {
      display: grid;
      gap: 12px;
    }

    .visual-card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .photo {
      position: relative;
      min-height: 202px;
      background: #ccd8d2;
    }

    .photo img {
      display: block;
      width: 100%;
      height: 230px;
      object-fit: cover;
    }

    .photo-band {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      background: linear-gradient(180deg, rgba(9, 26, 23, 0), rgba(9, 26, 23, .82));
      color: #fff;
      font-size: 12px;
      font-weight: 900;
    }

    .task-content {
      display: grid;
      gap: 10px;
      padding: 14px;
    }

    .task-content h2 {
      margin: 0;
      font-size: clamp(22px, 6.2vw, 32px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .prompt {
      display: grid;
      gap: 7px;
      color: #233137;
      font-size: 16px;
      line-height: 1.42;
    }

    .prompt-line {
      overflow-wrap: anywhere;
    }

    .prompt-line.is-label {
      color: var(--green);
      font-weight: 900;
    }

    .dict-hit {
      display: inline;
      border-bottom: 1px dashed rgba(19, 111, 99, .62);
      color: #0c665b;
      font-weight: 800;
      cursor: pointer;
    }

    .answer-zone {
      display: grid;
      gap: 10px;
      border-top: 1px solid #e0e8e3;
      padding-top: 2px;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
      font-weight: 900;
    }

    .choice-list,
    .multi-board {
      display: grid;
      gap: 8px;
    }

    .choice {
      width: 100%;
      min-height: 48px;
      border: 1px solid #b6cac4;
      border-radius: 8px;
      padding: 12px;
      background: #fff;
      color: var(--ink);
      text-align: left;
      font-weight: 900;
      line-height: 1.25;
      box-shadow: 0 2px 0 rgba(19, 111, 99, .08);
    }

    .choice:active,
    .choice.is-working,
    .mini-choice.is-selected {
      border-color: var(--green);
      background: #e2f4ef;
      transform: translateY(1px);
    }

    .choice:disabled,
    .mini-choice:disabled {
      opacity: .78;
    }

    .multi-row {
      display: grid;
      gap: 7px;
      padding: 9px;
      border: 1px solid #d0ddd7;
      border-radius: 8px;
      background: #fbfefd;
    }

    .multi-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .mini-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(86px, 1fr));
      gap: 7px;
    }

    .mini-choice {
      min-height: 42px;
      border: 1px solid #b8ccc6;
      border-radius: 8px;
      padding: 8px 9px;
      background: #fff;
      color: var(--ink);
      font-size: 13px;
      font-weight: 900;
      line-height: 1.18;
    }

    .status {
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
      line-height: 1.35;
    }

    .status.warn { color: var(--danger); }
    .status.ok { color: var(--ok); }

    .dictionary {
      position: fixed;
      z-index: 20;
      left: 12px;
      right: 12px;
      bottom: max(12px, env(safe-area-inset-bottom));
      display: none;
      padding: 12px;
      border: 1px solid #bfd0cb;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 16px 38px rgba(12, 28, 24, .22);
    }

    .dictionary.is-open { display: block; }

    .dict-word {
      color: var(--green);
      font-size: 17px;
      font-weight: 900;
    }

    .dict-meaning {
      margin-top: 5px;
      font-size: 15px;
      line-height: 1.35;
    }

    .dict-note {
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    @media (min-width: 720px) {
      .visual-card {
        display: grid;
        grid-template-columns: minmax(260px, 42%) 1fr;
      }

      .photo,
      .photo img {
        height: 100%;
        min-height: 560px;
      }

      .task-content {
        align-content: start;
        padding: 18px;
      }
    }
  </style>
</head>
<body class="notranslate" translate="no">

  </div>

        ]
      },
      {
        source: 70,
        title: "Wrong Item Inside",
        tag: "Returns story",
        image: "../logistic_exam/images/logistics_page3/claim_form_scene.jpg",
        lines: [
          "Receipt says Item B205.",
          "The box label says Item B205.",
          "Inside the box is Item A100.",
          "The customer says: I got the wrong item.",
          "What kind of return is this?"
        ],
        type: "single",
        choices: [
          ["Problem return. The inside item is different, so the worker should compare and call supervisor.", true],
          ["Simple return. Everything matches."],
          ["No return. The customer has no receipt."],
          ["Delivery problem only, not a return problem."]
        ]
      },
      {
        source: 73,
        title: "Lost Phone In A Taxi",
        tag: "Transport",
        image: "../logistic_exam/images/logistics_page3/people_scene.jpg",
        lines: [
          "Dan loses his phone in a taxi.",
          "He cannot use his map app or ticket app.",
          "He calls the bank and blocks his card.",
          "Why is the phone important for transport?"
        ],
        type: "single",
        choices: [
          ["Because it can have map, ticket, taxi, and bank apps.", true],
          ["Because a phone is a pallet."],
          ["Because the warehouse is closed."],
          ["Because barcodes do not scan in taxis."]
        ]
      },
      {
        source: 79,
        title: "Lost Phone Plan",
        tag: "Transport",
        image: "../logistic_exam/images/logistics_page3/decision_scene.jpg",
        lines: [
          "Situation: You lost your phone in a taxi.",
          "Choose the best plan."
        ],
        type: "single",
        choices: [
          ["Contact taxi driver/company, block card, ask for directions or use backup plan, fill report form.", true],
          ["Do nothing and walk randomly."],
          ["Give your password to a stranger."],
          ["Forget your address and delete the app."]
        ]
      },
      {
        source: 80,
        title: "Transport Problem Check",
        tag: "Final taps",
        image: "../logistic_exam/images/logistics_page3/desk_papers_scene.jpg",
        lines: [
          "Tap True or False for each sentence.",
          "1. If you lose a phone with bank apps, you may need to block your card.",
          "2. A map app helps you find the way.",
          "3. If you lose something in a taxi, you should contact the driver or company.",
          "4. A report form is never useful.",
          "5. A ticket app can be important for transport.",
          "6. A backup plan can help in a problem situation."
        ],
        type: "multiRow",
        options: ["True", "False"],
        correct: ["True", "True", "True", "False", "True", "True"]
      }
    ];

    const app = document.getElementById("app");
    const dictionaryPanel = document.getElementById("dictionary");
    const dictWord = document.getElementById("dictWord");
    const dictMeaning = document.getElementById("dictMeaning");
    let dictionary = new Map();
    let state = loadState();
    let hiddenCandidate = null;

    initProtection();
    loadDictionary();
    attemptQueuedSubmissions();
    window.addEventListener("online", attemptQueuedSubmissions);
    render();

    function emptyState() {
      return {
        version: VERSION,
        started: false,
        finished: false,
        current: 0,
        student: { name: "", group: "OPU23.1" },
        startedAt: "",
        taskStartedAt: "",
        answers: [],
        drafts: {},
        submissions: {},
        queue: [],
        securityEvents: []
      };
    }

    function loadState() {
      try {
        const stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!stored || stored.version !== VERSION) return emptyState();
        if (localStorage.getItem(LOCK_KEY)) stored.finished = true;
        stored.answers = stored.answers || [];
        stored.drafts = stored.drafts || {};
        stored.queue = stored.queue || [];
        stored.submissions = stored.submissions || {};
        stored.securityEvents = stored.securityEvents || [];
        return stored;
      } catch (error) {
        return emptyState();
      }
    }

    function saveState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        if (state.finished) localStorage.setItem(LOCK_KEY, state.finishedAt || new Date().toISOString());
      } catch (error) {
        setStatus("Progress storage is full. Tell the teacher.", "warn");
      }
    }

    function render() {
      if (state.finished) renderFinished();
      else if (!state.started) renderStart();
      else renderTask();
    }

    function renderStart() {
      app.innerHTML = `
        <section class="start">
          <div class="start-panel">
            <div class="start-art">
              <h1>Visual Logistics 25</h1>
              <p>Best 25 picture tasks. Tap answers, no typing.</p>
            </div>
            <form id="startForm" class="start-form" autocomplete="off">
              <div class="warning">Before you start, turn off VPN. If you leave the exam page, the current task changes to the next one.</div>
              <div class="field">
                <label for="name">Student name</label>
                <input id="name" required autocomplete="off" value="${escapeAttr(state.student.name)}">
              </div>
              <div class="field">
                <label for="group">Group</label>
                <input id="group" required autocomplete="off" value="${escapeAttr(state.student.group || "OPU23.1")}">
              </div>
              <label class="checkrow">
                <input id="vpn" type="checkbox" required>
                <span>VPN is off. I understand that finished tasks cannot be opened again.</span>
              </label>
              <button class="primary" type="submit">Start 25 tasks</button>
              <div id="status" class="status"></div>
            </form>
          </div>
        </section>
      `;

      document.getElementById("startForm").addEventListener("submit", (event) => {
        event.preventDefault();
        const name = document.getElementById("name").value.trim();
        const group = document.getElementById("group").value.trim();
        if (!name || !group) {
          setStatus("Write name and group first.", "warn");
          return;
        }
        state.student = { name, group };
        state.started = true;
        state.startedAt = state.startedAt || new Date().toISOString();
        state.taskStartedAt = new Date().toISOString();
        saveState();
        renderTask();
      });
    }

    function renderTask() {
      const task = TASKS[state.current];
      if (!task) {
        finishExam();
        return;
      }
      const progress = Math.round(state.current / TOTAL * 100);
      app.innerHTML = `
        <section class="topbar">
          <div class="toprow">
            <h1 class="title">Visual Logistics 25</h1>
            <div class="counter">${state.current + 1} / ${TOTAL}</div>
          </div>
          <div class="progress"><span style="width:${progress}%"></span></div>
        </section>
        <section class="task-shell">
          <article class="visual-card">
            <div class="photo">
              <img src="${escapeAttr(task.image)}" alt="" loading="eager">
              <div class="photo-band"><span>${escapeHtml(task.tag)}</span><span>Source task ${task.source}</span></div>
            </div>
            <div class="task-content">
              <h2>${escapeHtml(task.title)}</h2>
              <div class="prompt">${task.lines.map((line) => `<div class="prompt-line ${isLabel(line) ? "is-label" : ""}">${decorateLine(line)}</div>`).join("")}</div>
              <div class="answer-zone">${renderAnswer(task)}</div>
              <div id="status" class="status"></div>
            </div>
          </article>
        </section>
      `;
      attachAnswerHandlers(task);
      ensureTimer();
      setStatus(submissionStatusText(), "");
    }

    function renderAnswer(task) {
      if (task.type === "single") {
        return `
          <div class="hint">Tap the best answer. It saves immediately.</div>
          <div class="choice-list">
            ${orderedChoices(task).map((choice, index) => `
              <button class="choice" type="button" data-index="${index}">${choiceLetter(index)}. ${escapeHtml(choice.text)}</button>
            `).join("")}
          </div>
        `;
      }
      if (task.type === "multiSelect") {
        const draft = getDraft(task);
        return `
          <div class="hint">Choose exactly ${task.max} answers. It submits automatically.</div>
          <div class="multi-board">
            <div class="multi-row">
              <div class="multi-label">${draft.length} / ${task.max} selected</div>
              <div class="mini-grid">
                ${task.options.map((option) => `
                  <button class="mini-choice ${draft.includes(option) ? "is-selected" : ""}" type="button" data-value="${escapeAttr(option)}">${escapeHtml(option)}</button>
                `).join("")}
              </div>
            </div>
          </div>
        `;
      }
      const draft = getDraft(task);
      return `
        <div class="hint">Answer every row. It submits automatically.</div>
        <div class="multi-board">
          ${task.correct.map((_, row) => `
            <div class="multi-row" data-row="${row}">
              <div class="multi-label">Item ${row + 1}</div>
              <div class="mini-grid">
                ${task.options.map((option) => `
                  <button class="mini-choice ${draft[row] === option ? "is-selected" : ""}" type="button" data-row="${row}" data-value="${escapeAttr(option)}">${escapeHtml(option)}</button>
                `).join("")}
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function attachAnswerHandlers(task) {
      if (task.type === "single") {
        document.querySelectorAll(".choice").forEach((button) => {
          button.addEventListener("click", () => {
            const choice = orderedChoices(task)[Number(button.dataset.index)];
            document.querySelectorAll(".choice").forEach((item) => { item.disabled = true; });
            button.classList.add("is-working");
            window.setTimeout(() => submitTask(choice.text, Boolean(choice.correct), null), 120);
          });
        });
        return;
      }
      if (task.type === "multiSelect") {
        document.querySelectorAll(".mini-choice").forEach((button) => {
          button.addEventListener("click", () => chooseMultiSelect(task, button.dataset.value));
        });
        updateMultiStatus(task);
        return;
      }
      document.querySelectorAll(".mini-choice").forEach((button) => {
        button.addEventListener("click", () => chooseMultiRow(task, Number(button.dataset.row), button.dataset.value));
      });
      updateMultiStatus(task);
    }

    function orderedChoices(task) {
      const choices = task.choices.map((item, index) => ({ text: item[0], correct: Boolean(item[1]), source: index }));
      let seed = hashText([VERSION, state.student.name, state.student.group, task.source].join("|"));
      for (let i = choices.length - 1; i > 0; i -= 1) {
        seed = (seed * 1664525 + 1013904223) >>> 0;
        const j = seed % (i + 1);
        const swap = choices[i];
        choices[i] = choices[j];
        choices[j] = swap;
      }
      return choices;
    }

    function chooseMultiRow(task, row, value) {
      const draft = getDraft(task);
      draft[row] = value;
      state.drafts[task.source] = draft;
      const rowNode = document.querySelector(`.multi-row[data-row="${row}"]`);
      if (rowNode) {
        rowNode.querySelectorAll(".mini-choice").forEach((button) => {
          button.classList.toggle("is-selected", button.dataset.value === value);
        });
      }
      updateMultiStatus(task);
      saveState();
      if (draft.filter(Boolean).length === task.correct.length) {
        document.querySelectorAll(".mini-choice").forEach((button) => { button.disabled = true; });
        const correct = task.correct.every((item, index) => draft[index] === item);
        window.setTimeout(() => submitTask(draft.map((item, index) => `Item ${index + 1}: ${item}`).join("; "), correct, draft), 180);
      }
    }

    function chooseMultiSelect(task, value) {
      let draft = getDraft(task);
      if (draft.includes(value)) draft = draft.filter((item) => item !== value);
      else if (draft.length < task.max) draft = draft.concat(value);
      else {
        setStatus("You already chose " + task.max + ". Tap one selected answer to change it.", "warn");
        return;
      }
      state.drafts[task.source] = draft;
      document.querySelectorAll(".mini-choice").forEach((button) => {
        button.classList.toggle("is-selected", draft.includes(button.dataset.value));
      });
      updateMultiStatus(task);
      saveState();
      if (draft.length === task.max) {
        document.querySelectorAll(".mini-choice").forEach((button) => { button.disabled = true; });
        const correct = sameSet(draft, task.correct);
        window.setTimeout(() => submitTask(draft.join("; "), correct, draft), 220);
      }
    }

    function updateMultiStatus(task) {
      const draft = getDraft(task);
      if (task.type === "multiSelect") setStatus(draft.length + " / " + task.max + " selected.", draft.length ? "" : "warn");
      else setStatus(draft.filter(Boolean).length + " / " + task.correct.length + " answered.", draft.filter(Boolean).length ? "" : "warn");
    }

    function getDraft(task) {
      const draft = state.drafts[task.source];
      return Array.isArray(draft) ? draft.slice() : [];
    }

    function submitTask(answer, isCorrect, multiAnswers) {
      const task = TASKS[state.current];
      const now = new Date();
      const started = state.taskStartedAt ? new Date(state.taskStartedAt) : now;
      state.answers[state.current] = {
        number: state.current + 1,
        sourceTask: task.source,
        title: task.title,
        answer,
        isCorrect,
        multiAnswers,
        seconds: Math.max(0, Math.round((now - started) / 1000)),
        answeredAt: now.toISOString()
      };
      delete state.drafts[task.source];
      state.current += 1;
      state.taskStartedAt = new Date().toISOString();
      if (CHECKPOINTS.includes(state.current)) queueCheckpoint(state.current);
      if (state.current >= TOTAL) finishExam();
      else {
        saveState();
        attemptQueuedSubmissions();
        renderTask();
      }
    }

    function finishExam() {
      state.finished = true;
      state.finishedAt = state.finishedAt || new Date().toISOString();
      if (!state.submissions["25"]) queueCheckpoint(25);
      saveState();
      attemptQueuedSubmissions();
      renderFinished();
    }

    function renderFinished() {
      app.innerHTML = `
        <section class="finished">
          <div class="finish-panel">
            <div class="start-art">
              <h1>Exam Completed</h1>
              <p>Your answers are locked on this phone.</p>
            </div>
            <div class="finish-body">
              <div class="warning">Do not close immediately if a checkpoint is still queued. It will retry while internet is available.</div>
              <div id="status" class="status">${escapeHtml(submissionStatusText())}</div>
            </div>
          </div>
        </section>
      `;
    }

    function ensureTimer() {
      if (!state.taskStartedAt) {
        state.taskStartedAt = new Date().toISOString();
        saveState();
      }
    }

    function queueCheckpoint(stage) {
      const key = String(stage);
      if (state.submissions[key] && state.submissions[key].sentAt) return;
      const start = stage === 25 ? 20 : stage - 10;
      const payload = {
        exam: EXAM_CODE,
        version: VERSION,
        stage,
        range: (start + 1) + "-" + stage,
        student: state.student,
        startedAt: state.startedAt,
        checkpointAt: new Date().toISOString(),
        finishedAt: state.finishedAt || "",
        totalTasks: TOTAL,
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || "",
        userAgent: navigator.userAgent,
        securityEvents: state.securityEvents.slice(),
        answers: state.answers.slice(start, stage)
      };
      const item = { id: VERSION + "_" + stage + "_" + Date.now(), stage, payload };
      state.queue = state.queue.filter((queued) => queued.stage !== stage);
      state.queue.push(item);
      state.submissions[key] = { stage, queuedAt: item.payload.checkpointAt, sentAt: "" };
    }

    function attemptQueuedSubmissions() {
      if (!state.queue || !state.queue.length) return;
      state.queue.slice().forEach((item) => {
        submitPayload(item).then(() => {
          state.queue = state.queue.filter((queued) => queued.id !== item.id);
          state.submissions[String(item.stage)] = state.submissions[String(item.stage)] || { stage: item.stage };
          state.submissions[String(item.stage)].sentAt = new Date().toISOString();
          saveState();
          setStatus(submissionStatusText(), "ok");
        }).catch(() => setStatus("Checkpoint queued. It will retry.", "warn"));
      });
    }

    function submitPayload(item) {
      const body = new URLSearchParams();
      body.set(ENTRY_NAME, state.student.name || "Student");
      body.set(ENTRY_GROUP, state.student.group || "OPU23.1");
      body.set(ENTRY_EXAM, EXAM_CODE);
      body.set(ENTRY_JSON, JSON.stringify(item.payload));
      body.set("submit", "Submit");
      if (navigator.sendBeacon && document.visibilityState === "hidden") {
        const ok = navigator.sendBeacon(FORM_ACTION, body);
        if (ok) return Promise.resolve();
      }
      return fetch(FORM_ACTION, { method: "POST", mode: "no-cors", keepalive: true, body });
    }

    function submissionStatusText() {
      const sent = CHECKPOINTS.filter((stage) => state.submissions[String(stage)] && state.submissions[String(stage)].sentAt).length;
      if (state.queue && state.queue.length) return state.queue.length + " checkpoint(s) queued.";
      if (sent) return sent + " checkpoint(s) sent.";
      return "";
    }

    function loadDictionary() {
      fetch("words_fixed.json", { cache: "force-cache" })
        .then((response) => response.ok ? response.json() : [])
        .then((items) => {
          dictionary = new Map();
          (items || []).forEach((item) => {
            const key = normalizeWord(item.Word || item.word || "");
            const translation = item.Translation || item.translation || "";
            const emoji = item.Emoji || item.emoji || "";
            if (key && translation) dictionary.set(key, { translation, emoji });
          });
          if (state.started && !state.finished) renderTask();
        })
        .catch(() => {});
    }

    function decorateLine(line) {
      return String(line).split(/(\s+)/).map((piece) => {
        if (/^\s+$/.test(piece)) return piece;
        const key = normalizeWord(piece);
        const entry = lookupDictionary(key);
        if (!entry) return escapeHtml(piece);
        return `<span class="dict-hit" data-word="${escapeAttr(stripEdge(piece))}" data-key="${escapeAttr(key)}">${escapeHtml(piece)}</span>`;
      }).join("");
    }

    function lookupDictionary(key) {
      if (!key) return null;
      if (dictionary.has(key)) return dictionary.get(key);
      if (key.endsWith("ies") && dictionary.has(key.slice(0, -3) + "y")) return dictionary.get(key.slice(0, -3) + "y");
      if (key.endsWith("es") && dictionary.has(key.slice(0, -2))) return dictionary.get(key.slice(0, -2));
      if (key.endsWith("s") && key.length > 3 && dictionary.has(key.slice(0, -1))) return dictionary.get(key.slice(0, -1));
      if (key.endsWith("ing") && dictionary.has(key.slice(0, -3))) return dictionary.get(key.slice(0, -3));
      if (key.endsWith("ed") && dictionary.has(key.slice(0, -2))) return dictionary.get(key.slice(0, -2));
      return null;
    }

    document.addEventListener("click", (event) => {
      const hit = event.target.closest(".dict-hit");
      if (!hit) {
        if (!event.target.closest(".dictionary")) dictionaryPanel.classList.remove("is-open");
        return;
      }
      const entry = lookupDictionary(hit.dataset.key);
      if (!entry) return;
      dictWord.textContent = (entry.emoji ? entry.emoji + " " : "") + hit.dataset.word;
      dictMeaning.textContent = entry.translation;
      dictionaryPanel.classList.add("is-open");
    });

    function initProtection() {
      ["copy", "cut", "contextmenu", "dragstart", "selectstart"].forEach((name) => {
        document.addEventListener(name, (event) => {
          if (event.target && event.target.tagName === "INPUT" && name === "selectstart") return;
          event.preventDefault();
        }, { capture: true });
      });
      document.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();
        if ((event.ctrlKey || event.metaKey) && ["a", "c", "x", "p", "s", "u"].includes(key)) event.preventDefault();
      }, { capture: true });
      document.addEventListener("visibilitychange", () => {
        if (!state.started || state.finished) return;
        if (document.visibilityState === "hidden") {
          const task = TASKS[state.current];
          if (!task) return;
          hiddenCandidate = { source: task.source, at: Date.now() };
          state.securityEvents.push({ type: "page_hidden", sourceTask: task.source, at: new Date().toISOString() });
          saveState();
        } else if (document.visibilityState === "visible" && hiddenCandidate) {
          const task = TASKS[state.current];
          if (task && task.source === hiddenCandidate.source && Date.now() - hiddenCandidate.at > 1200) {
            hiddenCandidate = null;
            submitTask("[no answer: page was left]", false, null);
          } else {
            hiddenCandidate = null;
          }
        }
      });
      window.addEventListener("pagehide", () => {
        if (state.queue && state.queue.length) state.queue.slice(0, 1).forEach((item) => submitPayload(item).catch(() => {}));
      });
    }

    function setStatus(text, mode) {
      const node = document.getElementById("status");
      if (!node) return;
      node.textContent = text || "";
      node.className = "status" + (mode ? " " + mode : "");
    }

    function isLabel(line) {
      return /^(Text:|Questions:|Answer:|Situation:|Choose|Tap|Use:)/.test(line);
    }

    function sameSet(a, b) {
      if (a.length !== b.length) return false;
      const aa = a.slice().sort();
      const bb = b.slice().sort();
      return aa.every((item, index) => item === bb[index]);
    }

    function choiceLetter(index) {
      return String.fromCharCode(65 + index);
    }

    function hashText(text) {
      let hash = 2166136261;
      for (let i = 0; i < text.length; i += 1) {
        hash ^= text.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
      }
      return hash >>> 0;
    }

    function normalizeWord(value) {
      return stripEdge(value)
        .toLowerCase()
        .replace(/[’']/g, "")
        .replace(/[^a-z0-9 -]/g, "")
        .trim();
    }

    function stripEdge(value) {
      return String(value || "").replace(/^[^A-Za-z0-9]+|[^A-Za-z0-9]+$/g, "");
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/"/g, "&quot;");
    }
  </script>
</body>
</html>
