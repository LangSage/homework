<!DOCTYPE html>
<html lang="en" translate="no" class="notranslate">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="google" content="notranslate" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <title>Person Description Practice</title>
  <style>
    :root{
      --bg:#071126;
      --panel:#0b1730;
      --panel2:#0e1d3a;
      --line:rgba(148,163,184,.16);
      --text:#eef4ff;
      --muted:#9fb0d0;
      --blue:#66a7ff;
      --cyan:#2fd3ef;
      --good:#34d399;
      --bad:#fb7185;
      --shadow:0 24px 70px rgba(2,8,23,.45);
      --radius:24px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;min-height:100%;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top left, rgba(47,211,239,.10), transparent 24%), radial-gradient(circle at top right, rgba(102,167,255,.11), transparent 26%), linear-gradient(180deg,#020617,#071126 30%,#0b1730 100%);color:var(--text);user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;overflow-x:hidden}
    body *{user-select:none;-webkit-user-select:none}
    button,input{font:inherit}
    .app{min-height:100vh;padding:14px;display:grid;place-items:center}
    .card{width:min(920px,100%);background:linear-gradient(180deg,rgba(8,15,32,.94),rgba(9,18,38,.88));border:1px solid var(--line);border-radius:30px;box-shadow:var(--shadow);padding:18px}
    .screen{display:none}
    .screen.active{display:grid;gap:16px}
    .title{text-align:center;font-size:clamp(1.8rem,4vw,3rem);font-weight:900;letter-spacing:.01em;margin-top:4px}
    .sub{text-align:center;color:var(--muted);font-size:1rem}
    .fields{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px}
    .label{font-size:.95rem;color:#d4e1fb}
    .field-wrap{display:grid;gap:8px}
    .field{width:100%;background:rgba(5,13,28,.75);border:1px solid var(--line);border-radius:18px;padding:14px 16px;color:var(--text);outline:none}
    .field:focus{border-color:rgba(102,167,255,.7);box-shadow:0 0 0 3px rgba(102,167,255,.14)}
    .btn{border:0;border-radius:20px;padding:16px 18px;cursor:pointer;color:white;background:linear-gradient(90deg,var(--blue),var(--cyan));font-weight:800;min-height:56px}
    .btn.secondary{background:rgba(30,41,59,.78);border:1px solid var(--line);color:var(--text)}
    .topline{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;color:#d8e4ff;font-size:1.02rem;font-weight:700}
    .topline .muted{color:var(--muted);font-weight:600}
    .progress{height:12px;border-radius:999px;background:rgba(30,41,59,.86);border:1px solid rgba(148,163,184,.12);overflow:hidden}
    .progress>div{height:100%;width:0%;background:linear-gradient(90deg,var(--blue),var(--cyan));transition:width .22s ease}
    .task-shell{border:1px solid rgba(148,163,184,.13);border-radius:24px;background:linear-gradient(180deg,rgba(8,15,32,.72),rgba(8,15,32,.55));padding:14px;display:grid;gap:14px}
    .task-canvas-box{border-radius:20px;border:1px solid rgba(148,163,184,.12);overflow:hidden;background:rgba(5,13,28,.88)}
    #taskCanvas{display:block;width:100%}
    .options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .option{padding:0;border-radius:18px;border:1px solid rgba(148,163,184,.14);overflow:hidden;background:rgba(14,29,58,.9);cursor:pointer;transition:transform .14s ease,border-color .14s ease,box-shadow .14s ease;min-height:88px}
    .option:hover,.option:focus-visible{transform:translateY(-1px);border-color:rgba(102,167,255,.55);box-shadow:0 10px 24px rgba(2,8,23,.26);outline:none}
    .option.locked{pointer-events:none}
    .option.correct{border-color:rgba(52,211,153,.9);box-shadow:0 0 0 2px rgba(52,211,153,.16)}
    .option.wrong{border-color:rgba(251,113,133,.9);box-shadow:0 0 0 2px rgba(251,113,133,.14)}
    .option canvas{display:block;width:100%}
    .result-wrap{display:grid;gap:16px}
    .result-canvas-box{border-radius:24px;overflow:hidden;border:1px solid rgba(148,163,184,.14);background:rgba(5,13,28,.9)}
    #resultCanvas{display:block;width:100%}
    .result-actions{display:flex;justify-content:center}
    .popup{position:fixed;z-index:50;display:none;min-width:210px;max-width:min(320px,calc(100vw - 24px));padding:14px 16px;border-radius:18px;background:rgba(7,17,38,.96);border:1px solid rgba(148,163,184,.18);box-shadow:var(--shadow)}
    .popup.visible{display:grid;gap:8px}
    .popup strong{font-size:1.08rem}
    .popup .tr{color:#dbeafe}
    .popup .emoji{font-size:1.2rem}
    .toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(18px);background:rgba(7,17,38,.96);border:1px solid rgba(148,163,184,.18);color:var(--text);padding:12px 16px;border-radius:16px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:opacity .22s ease,transform .22s ease;z-index:60}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    @media (max-width:700px){
      .card{padding:14px;border-radius:24px}
      .fields,.options{grid-template-columns:1fr}
      .title{font-size:2rem}
    }
  </style>
</head>
<body class="notranslate" translate="no">
  <div class="app">
    <div class="card">
      <section id="startScreen" class="screen active">
        <div class="title">Person description practice</div>
        <div class="sub">45 exercises</div>
        <div class="fields">
          <div class="field-wrap">
            <label class="label" for="studentName">Name</label>
            <input class="field" id="studentName" autocomplete="off" spellcheck="false" />
          </div>
          <div class="field-wrap">
            <label class="label" for="studentGroup">Group</label>
            <input class="field" id="studentGroup" autocomplete="off" spellcheck="false" />
          </div>
        </div>
        <button class="btn" id="startBtn" type="button">Start</button>
      </section>

      <section id="practiceScreen" class="screen">
        <div class="topline">
          <div><span id="counter">1 / 45</span></div>
          <div class="muted" id="score">0 correct</div>
        </div>
        <div class="progress" aria-hidden="true"><div id="progressFill"></div></div>
        <div class="task-shell">
          <div class="task-canvas-box"><canvas id="taskCanvas"></canvas></div>
          <div class="options" id="options"></div>
        </div>
      </section>

      <section id="resultScreen" class="screen">
        <div class="result-wrap">
          <div class="result-canvas-box"><canvas id="resultCanvas"></canvas></div>
          <div class="result-actions"><button class="btn secondary" id="retryBtn" type="button">Start again</button></div>
        </div>
      </section>
    </div>
  </div>

  <div id="dictPopup" class="popup" role="dialog" aria-live="polite"></div>
  <div id="toast" class="toast"></div>

  <script>
    const CONFIG = {
      version: '2.0.0',
      totalTasks: 45,
      topicValue: 'topic',
      topicDisplay: 'Description of a person',
      storage: {
        state: 'personDescriptionPracticeStateV2',
        invalidation: 'personDescriptionPracticeInvalidationV2',
        submittedPrefix: 'personDescriptionPracticeSubmittedV2:'
      },
      form: {
        actionUrl: 'https://docs.google.com/forms/d/e/1FAIpQLSeUzYUvQbbzo_1r81AacP6Kj7HlKDzEVfa93Dam39LiVjcItA/viewform?usp=pp_url',
        fields: {
          name: 'entry.1582931880',
          group: 'entry.1222434157',
          topic: 'entry.371289786',
          payload: 'entry.679064514'
        }
      }
    };

    const WORDS = {
      hairLength: ['short','medium-length','long'],
      hairColor: ['black','brown','blonde','red','gray'],
      hairType: ['straight','wavy','curly','messy','bald'],
      lips: ['thin','full'],
      height: ['tall','short'],
      body: ['slim','thin','athletic','strong','chubby','average']
    };

    const NAMES = ['Kate','Tom','Anna','Leo','Nina','Max','Sara','Ben','Lena','Mark','Eva','Nick','Olga','Dan','Mia','Alex','Ira','Sam','Julia','Oleg'];

    const el = {
      startScreen: document.getElementById('startScreen'),
      practiceScreen: document.getElementById('practiceScreen'),
      resultScreen: document.getElementById('resultScreen'),
      studentName: document.getElementById('studentName'),
      studentGroup: document.getElementById('studentGroup'),
      startBtn: document.getElementById('startBtn'),
      retryBtn: document.getElementById('retryBtn'),
      counter: document.getElementById('counter'),
      score: document.getElementById('score'),
      progressFill: document.getElementById('progressFill'),
      taskCanvas: document.getElementById('taskCanvas'),
      resultCanvas: document.getElementById('resultCanvas'),
      options: document.getElementById('options'),
      dictPopup: document.getElementById('dictPopup'),
      toast: document.getElementById('toast')
    };

    let dictionary = {};
    let taskHits = [];
    let toastTimer = null;
    let answering = false;
    let appState = emptyState();

    function emptyState(){
      return {
        sessionId:'',
        seed:0,
        startedAt:null,
        completedAt:null,
        student:{name:'',group:''},
        stage:'idle',
        tasks:[],
        currentIndex:0,
        currentTaskStartedAt:null,
        results:[],
        score:{correct:0,total:0},
        submission:{inFlight:false,sent:false,sentAt:null,lastMessage:'Not sent'},
        integrity:{resets:0},
        autosavedAt:null
      };
    }

    function setScreen(name){
      el.startScreen.classList.toggle('active', name === 'start');
      el.practiceScreen.classList.toggle('active', name === 'practice');
      el.resultScreen.classList.toggle('active', name === 'result');
    }

    function saveState(){
      appState.autosavedAt = new Date().toISOString();
      localStorage.setItem(CONFIG.storage.state, JSON.stringify(appState));
    }

    function loadState(){
      try {
        const raw = localStorage.getItem(CONFIG.storage.state);
        return raw ? JSON.parse(raw) : null;
      } catch (e) {
        return null;
      }
    }

    function markInvalid(reason){
      localStorage.setItem(CONFIG.storage.invalidation, JSON.stringify({ reason, at: new Date().toISOString(), sessionId: appState.sessionId || null }));
    }

    function consumeInvalid(){
      try {
        const raw = localStorage.getItem(CONFIG.storage.invalidation);
        if (!raw) return null;
        localStorage.removeItem(CONFIG.storage.invalidation);
        return JSON.parse(raw);
      } catch (e) {
        localStorage.removeItem(CONFIG.storage.invalidation);
        return null;
      }
    }

    function simpleId(){
      return `${Date.now().toString(36)}-${Math.random().toString(36).slice(2,8)}`;
    }

    function randomSeed(){
      return Math.floor(Math.random() * 2147483646) + 1;
    }

    function mulberry32(a){
      return function(){
        a |= 0; a = (a + 0x6D2B79F5) | 0;
        let t = Math.imul(a ^ (a >>> 15), 1 | a);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function shuffle(arr, rnd){
      const a = [...arr];
      for(let i=a.length-1;i>0;i--){
        const j = Math.floor(rnd() * (i+1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function choice(arr, rnd){ return arr[Math.floor(rnd() * arr.length)]; }
    function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
    function article(word){ return /^[aeiou]/i.test(word) ? 'an' : 'a'; }

    function normalize(word){
      return String(word || '').toLowerCase().replace(/[“”"'.,!?;:()]/g, '').replace(/\s+/g, ' ').trim();
    }

    async function loadWords(){
      dictionary = {};
      try {
        const res = await fetch(`./words.json?v=${Date.now()}`, { cache: 'no-store' });
        const list = await res.json();
        if (Array.isArray(list)) {
          list.forEach(item => {
            const key = normalize(item.Word || item.word);
            if (!key) return;
            dictionary[key] = {
              word: item.Word || item.word || key,
              translation: item.Translation || item.translation || '',
              emoji: item.Emoji || item.emoji || '📘'
            };
          });
        }
      } catch (e) {
        dictionary = {};
      }
    }

    function hairPhrase(p){
      if (p.hairType === 'bald') return 'bald';
      return `${p.hairLength} ${p.hairColor} ${p.hairType} hair`;
    }

    function fullSentence(p){
      if (p.hairType === 'bald') return `${p.name} is bald, ${p.height}, with ${p.lips} lips and ${article(p.body)} ${p.body} body.`;
      return `${p.name} has ${p.hairLength} ${p.hairColor} ${p.hairType} hair, is ${p.height}, has ${p.lips} lips, and has ${article(p.body)} ${p.body} body.`;
    }

    function createPerson(rnd, forceName){
      const hairType = choice(WORDS.hairType, rnd);
      return {
        name: forceName || choice(NAMES, rnd),
        hairLength: hairType === 'bald' ? null : choice(WORDS.hairLength, rnd),
        hairColor: hairType === 'bald' ? null : choice(WORDS.hairColor, rnd),
        hairType,
        lips: choice(WORDS.lips, rnd),
        height: choice(WORDS.height, rnd),
        body: choice(WORDS.body, rnd)
      };
    }

    function differentOption(correct, pool, rnd, extra = []){
      const used = new Set([correct, ...extra]);
      const candidates = shuffle(pool.filter(x => !used.has(x)), rnd);
      return candidates[0] || correct;
    }

    function taskChooseHairLength(rnd, idx){
      let p = createPerson(rnd, choice(NAMES, rnd));
      while (p.hairType === 'bald') p = createPerson(rnd, p.name);
      const correct = p.hairLength;
      const opts = shuffle([correct, ...shuffle(WORDS.hairLength.filter(x => x !== correct), rnd).slice(0,2), 'bald'], rnd).slice(0,4);
      return { id:`t${idx}`, type:'hair_length', category:'hair', correctIndex:opts.indexOf(correct), prompt:`${p.name} has ${hairPhrase(p)}. Choose hair length.`, options:opts };
    }

    function taskChooseHairColor(rnd, idx){
      let p = createPerson(rnd, choice(NAMES, rnd));
      while (p.hairType === 'bald') p = createPerson(rnd, p.name);
      const correct = p.hairColor;
      const opts = shuffle([correct, ...shuffle(WORDS.hairColor.filter(x => x !== correct), rnd).slice(0,3)], rnd);
      return { id:`t${idx}`, type:'hair_color', category:'hair', correctIndex:opts.indexOf(correct), prompt:`${p.name} has ${hairPhrase(p)}. Choose hair color.`, options:opts };
    }

    function taskChooseHairType(rnd, idx){
      const p = createPerson(rnd, choice(NAMES, rnd));
      const correct = p.hairType;
      const opts = shuffle([correct, ...shuffle(WORDS.hairType.filter(x => x !== correct), rnd).slice(0,3)], rnd);
      const text = p.hairType === 'bald' ? `${p.name} is bald. Choose hair type.` : `${p.name} has ${hairPhrase(p)}. Choose hair type.`;
      return { id:`t${idx}`, type:'hair_type', category:'hair', correctIndex:opts.indexOf(correct), prompt:text, options:opts };
    }

    function taskChooseLips(rnd, idx){
      const p = createPerson(rnd, choice(NAMES, rnd));
      const correct = p.lips;
      const opts = shuffle([correct, ...shuffle(['thin','full','tall','short'].filter(x => x !== correct), rnd).slice(0,3)], rnd);
      return { id:`t${idx}`, type:'lips', category:'lips', correctIndex:opts.indexOf(correct), prompt:`${p.name} has ${p.lips} lips. Choose lips.`, options:opts };
    }

    function taskChooseHeight(rnd, idx){
      const p = createPerson(rnd, choice(NAMES, rnd));
      const correct = p.height;
      const opts = shuffle([correct, ...shuffle(['tall','short','slim','strong','chubby'].filter(x => x !== correct), rnd).slice(0,3)], rnd);
      return { id:`t${idx}`, type:'height', category:'height', correctIndex:opts.indexOf(correct), prompt:`${p.name} is ${p.height}. Choose height.`, options:opts };
    }

    function taskChooseBody(rnd, idx){
      const p = createPerson(rnd, choice(NAMES, rnd));
      const correct = p.body;
      const opts = shuffle([correct, ...shuffle(WORDS.body.filter(x => x !== correct), rnd).slice(0,3)], rnd);
      return { id:`t${idx}`, type:'body', category:'body', correctIndex:opts.indexOf(correct), prompt:`${p.name} has ${article(p.body)} ${p.body} body. Choose body type.`, options:opts };
    }

    function taskBestSentence(rnd, idx){
      const p = createPerson(rnd, choice(NAMES, rnd));
      const correct = fullSentence(p);
      const variants = [];
      const p1 = { ...p, height: p.height === 'tall' ? 'short' : 'tall' };
      const p2 = { ...p, lips: p.lips === 'thin' ? 'full' : 'thin' };
      const p3 = { ...p, body: differentOption(p.body, WORDS.body, rnd) };
      variants.push(correct, fullSentence(p1), fullSentence(p2), fullSentence(p3));
      const opts = shuffle(variants, rnd);
      const prompt = p.hairType === 'bald'
        ? `${p.name} is bald, ${p.height}, with ${p.lips} lips and ${article(p.body)} ${p.body} body. Choose the best sentence.`
        : `${p.name} has ${hairPhrase(p)}, is ${p.height}, has ${p.lips} lips, and has ${article(p.body)} ${p.body} body. Choose the best sentence.`;
      return { id:`t${idx}`, type:'best_sentence', category:'mixed', correctIndex:opts.indexOf(correct), prompt, options:opts };
    }

    function taskWhoIsIt(rnd, idx){
      const people = shuffle(NAMES, rnd).slice(0,4).map(n => createPerson(rnd, n));
      const correctPerson = choice(people, rnd);
      const prompt = correctPerson.hairType === 'bald'
        ? `Who is bald, ${correctPerson.height}, with ${correctPerson.lips} lips and ${article(correctPerson.body)} ${correctPerson.body} body?`
        : `Who has ${hairPhrase(correctPerson)}, is ${correctPerson.height}, has ${correctPerson.lips} lips, and has ${article(correctPerson.body)} ${correctPerson.body} body?`;
      const opts = shuffle(people.map(p => p.name), rnd);
      return { id:`t${idx}`, type:'who', category:'mixed', correctIndex:opts.indexOf(correctPerson.name), prompt, options:opts };
    }

    function taskMissingWord(rnd, idx){
      const mode = choice(['hairLength','hairColor','hairType','lips','height','body'], rnd);
      const p = createPerson(rnd, choice(NAMES, rnd));
      let prompt = '';
      let correct = '';
      let pool = [];
      if (mode === 'hairLength') {
        let pp = p; while (pp.hairType === 'bald') pp = createPerson(rnd, pp.name);
        prompt = `${pp.name} has ___ ${pp.hairColor} ${pp.hairType} hair.`;
        correct = pp.hairLength; pool = [...WORDS.hairLength, 'bald'];
      } else if (mode === 'hairColor') {
        let pp = p; while (pp.hairType === 'bald') pp = createPerson(rnd, pp.name);
        prompt = `${pp.name} has ${pp.hairLength} ___ ${pp.hairType} hair.`;
        correct = pp.hairColor; pool = WORDS.hairColor;
      } else if (mode === 'hairType') {
        if (p.hairType === 'bald') {
          prompt = `${p.name} is ___.`;
          correct = 'bald'; pool = WORDS.hairType;
        } else {
          prompt = `${p.name} has ${p.hairLength} ${p.hairColor} ___ hair.`;
          correct = p.hairType; pool = WORDS.hairType;
        }
      } else if (mode === 'lips') {
        prompt = `${p.name} has ___ lips.`; correct = p.lips; pool = ['thin','full','tall','short'];
      } else if (mode === 'height') {
        prompt = `${p.name} is ___.`; correct = p.height; pool = ['tall','short','slim','strong'];
      } else {
        prompt = `${p.name} has ${article(p.body)} ___ body.`; correct = p.body; pool = WORDS.body;
      }
      const opts = shuffle([correct, ...shuffle(pool.filter(x => x !== correct), rnd).slice(0,3)], rnd);
      return { id:`t${idx}`, type:'missing', category:'mixed', correctIndex:opts.indexOf(correct), prompt:`${prompt} Choose the missing word.`, options:opts };
    }

    function createTaskSet(seed){
      const rnd = mulberry32(seed);
      const makers = [taskChooseHairLength, taskChooseHairColor, taskChooseHairType, taskChooseLips, taskChooseHeight, taskChooseBody, taskBestSentence, taskWhoIsIt, taskMissingWord];
      const tasks = [];
      let idx = 1;
      for (let round = 0; round < 5; round++) {
        const order = shuffle(makers, rnd);
        order.forEach(make => tasks.push(make(rnd, idx++)));
      }
      return tasks.slice(0, CONFIG.totalTasks);
    }

    function drawWrapped(ctx, text, x, y, maxWidth, lineHeight, color, hits){
      const tokens = String(text).match(/\S+|\s+/g) || [];
      let cx = x;
      let cy = y;
      for (const token of tokens) {
        if (/^\s+$/.test(token)) {
          const w = ctx.measureText(token).width;
          if (cx + w > x + maxWidth) {
            cx = x;
            cy += lineHeight;
          } else {
            cx += w;
          }
          continue;
        }
        const clean = normalize(token);
        const entry = dictionary[clean];
        const w = ctx.measureText(token).width;
        if (cx !== x && cx + w > x + maxWidth) {
          cx = x;
          cy += lineHeight;
        }
        ctx.fillStyle = entry ? '#7dd3fc' : color;
        ctx.fillText(token, cx, cy);
        if (entry) {
          ctx.strokeStyle = 'rgba(125,211,252,.78)';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(cx, cy + 5);
          ctx.lineTo(cx + w, cy + 5);
          ctx.stroke();
          hits.push({ x: cx, y: cy - 26, width: w, height: 36, entry });
        }
        cx += w;
      }
      return cy;
    }

    function measureTextHeight(text, width, fontSize, lineHeight){
      const c = document.createElement('canvas');
      const ctx = c.getContext('2d');
      ctx.font = `700 ${fontSize}px Inter, system-ui, sans-serif`;
      const tokens = String(text).match(/\S+|\s+/g) || [];
      let cx = 0;
      let lines = 1;
      for (const token of tokens) {
        const w = ctx.measureText(token).width;
        if (/^\s+$/.test(token)) {
          if (cx + w > width) { cx = 0; lines += 1; } else { cx += w; }
        } else {
          if (cx !== 0 && cx + w > width) { cx = 0; lines += 1; }
          cx += w;
        }
      }
      return lines * lineHeight;
    }

    function prepCanvas(canvas, cssWidth, cssHeight){
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      canvas.style.width = `${cssWidth}px`;
      canvas.style.height = `${cssHeight}px`;
      canvas.width = Math.round(cssWidth * dpr);
      canvas.height = Math.round(cssHeight * dpr);
      const ctx = canvas.getContext('2d');
      ctx.setTransform(dpr,0,0,dpr,0,0);
      return { ctx, width: cssWidth, height: cssHeight };
    }

    function renderTask(){
      const task = appState.tasks[appState.currentIndex];
      if (!task) return;
      const box = el.taskCanvas.parentElement.getBoundingClientRect();
      const width = Math.max(280, Math.floor(box.width));
      const pad = window.innerWidth < 700 ? 18 : 24;
      const fontSize = window.innerWidth < 700 ? 25 : 30;
      const lineHeight = Math.round(fontSize * 1.5);
      const promptHeight = measureTextHeight(task.prompt, width - pad * 2, fontSize, lineHeight);
      const height = Math.max(210, promptHeight + pad * 2 + 16);
      const { ctx } = prepCanvas(el.taskCanvas, width, height);
      taskHits = [];
      const grad = ctx.createLinearGradient(0,0,width,height);
      grad.addColorStop(0,'rgba(11,23,48,.98)');
      grad.addColorStop(1,'rgba(5,13,28,.98)');
      ctx.fillStyle = grad;
      ctx.fillRect(0,0,width,height);
      ctx.fillStyle = '#eef4ff';
      ctx.font = `800 ${fontSize}px Inter, system-ui, sans-serif`;
      drawWrapped(ctx, task.prompt, pad, pad + fontSize, width - pad * 2, lineHeight, '#eef4ff', taskHits);

      el.options.innerHTML = '';
      task.options.forEach((opt, index) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'option';
        button.dataset.index = String(index);
        const canvas = document.createElement('canvas');
        button.appendChild(canvas);
        button.addEventListener('click', () => answer(index));
        el.options.appendChild(button);
        renderOption(canvas, opt, 'idle');
      });

      el.counter.textContent = `${appState.currentIndex + 1} / ${appState.tasks.length}`;
      el.score.textContent = `${appState.score.correct} correct`;
      const done = appState.currentIndex / appState.tasks.length * 100;
      el.progressFill.style.width = `${done}%`;
      saveState();
    }

    function renderOption(canvas, text, state){
      const boxWidth = el.options.getBoundingClientRect().width;
      const singleCol = window.innerWidth < 700;
      const width = Math.floor(singleCol ? boxWidth : (boxWidth - 12) / 2);
      const fontSize = window.innerWidth < 700 ? 23 : 24;
      const lineHeight = Math.round(fontSize * 1.35);
      const pad = 16;
      const textHeight = measureTextHeight(text, width - pad*2, fontSize, lineHeight);
      const height = Math.max(88, textHeight + pad * 2);
      const { ctx } = prepCanvas(canvas, width, height);
      let fill1 = 'rgba(14,29,58,.94)', fill2 = 'rgba(11,23,48,.98)', stroke = 'rgba(148,163,184,.14)', textColor = '#eef4ff';
      if (state === 'correct') { fill1='rgba(6,95,70,.92)'; fill2='rgba(4,78,56,.96)'; stroke='rgba(52,211,153,.72)'; }
      if (state === 'wrong') { fill1='rgba(127,29,29,.9)'; fill2='rgba(104,20,20,.96)'; stroke='rgba(251,113,133,.75)'; }
      const grad = ctx.createLinearGradient(0,0,width,height);
      grad.addColorStop(0, fill1); grad.addColorStop(1, fill2);
      ctx.fillStyle = grad;
      roundRect(ctx, 0, 0, width, height, 18);
      ctx.fill();
      ctx.strokeStyle = stroke;
      ctx.lineWidth = 1;
      roundRect(ctx, .5, .5, width - 1, height - 1, 18);
      ctx.stroke();
      ctx.fillStyle = textColor;
      ctx.font = `800 ${fontSize}px Inter, system-ui, sans-serif`;
      drawWrapped(ctx, text, pad, pad + fontSize, width - pad * 2, lineHeight, textColor, []);
    }

    function roundRect(ctx, x, y, w, h, r){
      const rr = Math.min(r, w/2, h/2);
      ctx.beginPath();
      ctx.moveTo(x + rr, y);
      ctx.arcTo(x + w, y, x + w, y + h, rr);
      ctx.arcTo(x + w, y + h, x, y + h, rr);
      ctx.arcTo(x, y + h, x, y, rr);
      ctx.arcTo(x, y, x + w, y, rr);
      ctx.closePath();
    }

    function showToast(text){
      el.toast.textContent = text;
      el.toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.toast.classList.remove('show'), 1800);
    }

    function startSession(reason='manual'){
      const name = el.studentName.value.trim();
      const group = el.studentGroup.value.trim();
      if (!name || !group) { showToast('Enter name and group.'); return; }
      const resets = reason === 'focus-loss' ? ((appState.integrity?.resets || 0) + 1) : (appState.integrity?.resets || 0);
      appState = emptyState();
      appState.sessionId = simpleId();
      appState.seed = randomSeed();
      appState.startedAt = new Date().toISOString();
      appState.student = { name, group };
      appState.stage = 'running';
      appState.integrity.resets = resets;
      appState.tasks = createTaskSet(appState.seed);
      appState.currentIndex = 0;
      appState.currentTaskStartedAt = new Date().toISOString();
      setScreen('practice');
      renderTask();
      if (reason === 'focus-loss') showToast('New set loaded.');
    }

    function answer(selectedIndex){
      if (answering) return;
      answering = true;
      const task = appState.tasks[appState.currentIndex];
      const buttons = [...el.options.querySelectorAll('.option')];
      buttons.forEach(btn => btn.classList.add('locked'));
      buttons.forEach((btn, idx) => {
        if (idx === task.correctIndex) btn.classList.add('correct');
        if (idx === selectedIndex && idx !== task.correctIndex) btn.classList.add('wrong');
        const state = idx === task.correctIndex ? 'correct' : (idx === selectedIndex && idx !== task.correctIndex ? 'wrong' : 'idle');
        const canvas = btn.querySelector('canvas');
        renderOption(canvas, task.options[idx], state);
      });
      const timeMs = Math.max(0, Date.now() - new Date(appState.currentTaskStartedAt || Date.now()).getTime());
      const correct = selectedIndex === task.correctIndex;
      appState.results.push({
        taskId: task.id,
        type: task.type,
        category: task.category,
        correct,
        timeMs
      });
      appState.score.total += 1;
      if (correct) appState.score.correct += 1;
      saveState();
      setTimeout(nextTask, 650);
    }

    function nextTask(){
      appState.currentIndex += 1;
      answering = false;
      if (appState.currentIndex >= appState.tasks.length) {
        finishSession();
        return;
      }
      appState.currentTaskStartedAt = new Date().toISOString();
      renderTask();
    }

    function buildPayload(){
      return {
        version: CONFIG.version,
        sessionId: appState.sessionId,
        student: { name: appState.student.name, group: appState.student.group },
        topic: CONFIG.topicValue,
        startedAt: appState.startedAt,
        completedAt: appState.completedAt,
        total: appState.score.total,
        correct: appState.score.correct,
        percent: appState.score.total ? Math.round(appState.score.correct / appState.score.total * 100) : 0,
        resetsDuringRun: appState.integrity.resets,
        results: appState.results.map((r, i) => ({
          n: i + 1,
          type: r.type,
          category: r.category,
          correct: r.correct,
          timeMs: r.timeMs
        }))
      };
    }

    function finishSession(){
      appState.stage = 'complete';
      appState.completedAt = new Date().toISOString();
      saveState();
      setScreen('result');
      renderResult();
      submitResultsOnce();
    }

    function renderResult(){
      const box = el.resultCanvas.parentElement.getBoundingClientRect();
      const width = Math.max(320, Math.floor(box.width));
      const height = Math.max(620, Math.floor(width * 1.08));
      const { ctx } = prepCanvas(el.resultCanvas, width, height);
      const grad = ctx.createLinearGradient(0,0,width,height);
      grad.addColorStop(0,'rgba(11,23,48,.99)');
      grad.addColorStop(1,'rgba(5,13,28,.99)');
      ctx.fillStyle = grad;
      ctx.fillRect(0,0,width,height);

      const pct = appState.score.total ? Math.round(appState.score.correct / appState.score.total * 100) : 0;
      const pad = Math.round(width * 0.06);
      ctx.fillStyle = '#eef4ff';
      ctx.font = `900 ${Math.max(28, Math.round(width * 0.045))}px Inter, system-ui, sans-serif`;
      ctx.fillText('Practice result', pad, pad + 10);
      ctx.fillStyle = '#a7b5cc';
      ctx.font = `700 ${Math.max(16, Math.round(width * 0.02))}px Inter, system-ui, sans-serif`;
      ctx.fillText(`${appState.student.name} • ${appState.student.group}`, pad, pad + 50);
      ctx.fillText(CONFIG.topicDisplay, pad, pad + 78);

      const cx = width / 2;
      const cy = pad + 180;
      const radius = Math.min(120, Math.round(width * 0.13));
      ctx.lineWidth = Math.max(12, Math.round(width * 0.015));
      ctx.strokeStyle = 'rgba(30,41,59,.92)';
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.stroke();
      ctx.strokeStyle = '#2fd3ef';
      ctx.beginPath();
      ctx.arc(cx, cy, radius, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * (pct / 100));
      ctx.stroke();
      ctx.fillStyle = '#eef4ff';
      ctx.font = `900 ${Math.max(34, Math.round(width * 0.07))}px Inter, system-ui, sans-serif`;
      const pctText = `${pct}%`;
      ctx.fillText(pctText, cx - ctx.measureText(pctText).width / 2, cy + 12);

      const cards = [
        ['Correct', String(appState.score.correct)],
        ['Total', String(appState.score.total)],
        ['Protected resets', String(appState.integrity.resets)],
        ['Submit', appState.submission.sent ? 'sent' : (appState.submission.inFlight ? 'sending' : 'pending')]
      ];
      const cols = 2;
      const gap = 16;
      const cardW = (width - pad * 2 - gap) / 2;
      const cardH = 110;
      let top = cy + radius + 42;
      cards.forEach((item, i) => {
        const col = i % cols;
        const row = Math.floor(i / cols);
        const x = pad + col * (cardW + gap);
        const y = top + row * (cardH + gap);
        ctx.fillStyle = 'rgba(15,23,42,.78)';
        roundRect(ctx, x, y, cardW, cardH, 22);
        ctx.fill();
        ctx.strokeStyle = 'rgba(148,163,184,.12)';
        ctx.stroke();
        ctx.fillStyle = '#a7b5cc';
        ctx.font = `700 ${Math.max(16, Math.round(width * 0.02))}px Inter, system-ui, sans-serif`;
        ctx.fillText(item[0], x + 18, y + 35);
        ctx.fillStyle = '#eef4ff';
        ctx.font = `900 ${Math.max(26, Math.round(width * 0.04))}px Inter, system-ui, sans-serif`;
        ctx.fillText(item[1], x + 18, y + 74);
      });

      const footerY = height - 70;
      ctx.fillStyle = '#a7b5cc';
      ctx.font = `700 ${Math.max(15, Math.round(width * 0.018))}px Inter, system-ui, sans-serif`;
      ctx.fillText(`Finished: ${new Date(appState.completedAt).toLocaleString()}`, pad, footerY);
      ctx.fillText('Take a screenshot now.', pad, footerY + 28);
    }

    function openPopup(entry, clientX, clientY){
      el.dictPopup.innerHTML = `<div><span class="emoji">${entry.emoji}</span> <strong>${escapeHtml(entry.word)}</strong></div><div class="tr">${escapeHtml(entry.translation)}</div>`;
      el.dictPopup.classList.add('visible');
      const rect = el.dictPopup.getBoundingClientRect();
      const left = clamp(clientX + 12, 10, window.innerWidth - rect.width - 10);
      const top = clamp(clientY + 12, 10, window.innerHeight - rect.height - 10);
      el.dictPopup.style.left = `${left}px`;
      el.dictPopup.style.top = `${top}px`;
    }

    function closePopup(){ el.dictPopup.classList.remove('visible'); }
    function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

    function handleTaskCanvasClick(event){
      const rect = el.taskCanvas.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      const hit = taskHits.find(h => x >= h.x && x <= h.x + h.width && y >= h.y && y <= h.y + h.height);
      if (hit) openPopup(hit.entry, event.clientX, event.clientY); else closePopup();
    }

    function alreadySubmitted(id){ return localStorage.getItem(`${CONFIG.storage.submittedPrefix}${id}`) === '1'; }
    function normalizeFormAction(url){ return url.includes('/formResponse') ? url : url.replace('/viewform','/formResponse').split('?')[0]; }

    async function submitResultsOnce(){
      if (!appState.sessionId || appState.submission.inFlight || appState.submission.sent || alreadySubmitted(appState.sessionId)) {
        appState.submission.sent = appState.submission.sent || alreadySubmitted(appState.sessionId);
        saveState();
        renderResult();
        return;
      }
      const action = normalizeFormAction(CONFIG.form.actionUrl);
      const fields = CONFIG.form.fields;
      if (!action || action.includes('PASTE_')) return;
      appState.submission.inFlight = true;
      saveState();
      renderResult();
      const body = new URLSearchParams();
      body.set(fields.name, appState.student.name);
      body.set(fields.group, appState.student.group);
      body.set(fields.topic, CONFIG.topicValue);
      body.set(fields.payload, JSON.stringify(buildPayload()));
      try {
        await fetch(action, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/x-www-form-urlencoded;charset=UTF-8'}, body });
        localStorage.setItem(`${CONFIG.storage.submittedPrefix}${appState.sessionId}`, '1');
        appState.submission.sent = true;
        appState.submission.sentAt = new Date().toISOString();
        appState.submission.lastMessage = 'sent';
      } catch (e) {
        appState.submission.lastMessage = 'failed';
      } finally {
        appState.submission.inFlight = false;
        saveState();
        renderResult();
      }
    }

    function bindAntiCopy(){
      const stop = e => { e.preventDefault(); return false; };
      ['contextmenu','copy','cut','dragstart','selectstart'].forEach(type => document.addEventListener(type, stop));
      document.addEventListener('keydown', e => {
        const key = e.key.toLowerCase();
        if (((e.ctrlKey || e.metaKey) && ['c','x','a','s','u','p'].includes(key)) || key === 'f12') e.preventDefault();
      });
    }

    function bindIntegrity(){
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden' && appState.stage === 'running') markInvalid('hidden');
      });
      window.addEventListener('pagehide', () => { if (appState.stage === 'running') markInvalid('pagehide'); });
      window.addEventListener('beforeunload', () => { if (appState.stage === 'running') markInvalid('beforeunload'); });
    }

    function restore(){
      const saved = loadState();
      const invalid = consumeInvalid();
      if (saved) {
        appState = saved;
        el.studentName.value = saved.student?.name || '';
        el.studentGroup.value = saved.student?.group || '';
      }
      const nav = performance.getEntriesByType('navigation')[0];
      const wasReload = nav && nav.type === 'reload';
      if ((invalid || wasReload) && saved && saved.student && saved.student.name && saved.student.group && saved.stage === 'running') {
        startSession('focus-loss');
        return;
      }
      if (saved && saved.stage === 'complete') {
        setScreen('result');
        renderResult();
        return;
      }
      setScreen('start');
    }

    function bindEvents(){
      el.startBtn.addEventListener('click', () => startSession('manual'));
      el.retryBtn.addEventListener('click', () => startSession('manual'));
      el.taskCanvas.addEventListener('click', handleTaskCanvasClick);
      document.addEventListener('click', e => {
        if (!el.dictPopup.contains(e.target) && e.target !== el.taskCanvas) closePopup();
      });
      window.addEventListener('resize', () => {
        if (appState.stage === 'running') renderTask();
        if (appState.stage === 'complete') renderResult();
      });
    }

    async function init(){
      bindAntiCopy();
      bindIntegrity();
      bindEvents();
      await loadWords();
      restore();
    }

    init();
  </script>
</body>
</html>
