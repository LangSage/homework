<!DOCTYPE html>
<html lang="en" translate="no" class="notranslate">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="google" content="notranslate" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <title>Person Description Practice</title>
  <style>
    :root {
      --bg-1: #020617;
      --bg-2: #0f172a;
      --panel: rgba(7, 16, 36, 0.9);
      --panel-2: rgba(12, 24, 50, 0.9);
      --line: rgba(148, 163, 184, 0.16);
      --text: #e5eefc;
      --muted: #a8b7d2;
      --accent: #60a5fa;
      --accent-2: #22d3ee;
      --good: #34d399;
      --bad: #fb7185;
      --shadow: 0 22px 60px rgba(2, 8, 23, 0.42);
      --radius: 24px;
      --radius-sm: 18px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(34, 211, 238, 0.08), transparent 24%),
        radial-gradient(circle at top right, rgba(96, 165, 250, 0.08), transparent 24%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      overflow-x: hidden;
    }

    body * { user-select: none; -webkit-user-select: none; }
    body.locked-copy { -webkit-user-select: none; user-select: none; }

    button, input { font: inherit; }

    .app {
      min-height: 100vh;
      padding: 12px;
      display: grid;
      place-items: center;
    }

    .shell {
      width: min(980px, 100%);
      background: linear-gradient(180deg, rgba(8,16,36,0.95), rgba(8,16,36,0.88));
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .start-screen,
    .practice-screen,
    .result-screen {
      padding: 18px;
      display: grid;
      gap: 16px;
    }

    .top-simple {
      display: grid;
      gap: 10px;
    }

    .title {
      font-size: clamp(1.6rem, 3vw, 2.5rem);
      font-weight: 800;
      text-align: center;
      letter-spacing: -0.03em;
    }

    .mini {
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .start-fields {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field-wrap {
      display: grid;
      gap: 6px;
    }

    .label {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .field {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 15px;
      background: rgba(15, 23, 42, 0.72);
      color: var(--text);
      outline: none;
    }

    .field:focus {
      border-color: rgba(96, 165, 250, 0.65);
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.14);
    }

    .btn {
      border: 0;
      border-radius: 18px;
      min-height: 54px;
      padding: 14px 18px;
      font-weight: 800;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
    }

    .btn.secondary {
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid var(--line);
      color: var(--text);
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      flex-wrap: wrap;
      font-size: 0.92rem;
    }

    .progress-track {
      width: 100%;
      height: 12px;
      background: rgba(30, 41, 59, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 0.25s ease;
    }

    .task-wrap {
      display: grid;
      gap: 14px;
    }

    .canvas-box,
    .support-box,
    .result-box {
      border: 1px solid var(--line);
      border-radius: 22px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(11, 21, 46, 0.96), rgba(6, 16, 36, 0.96));
    }

    canvas {
      display: block;
      width: 100%;
      max-width: 100%;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
    }

    .support-grid,
    .options-grid {
      display: grid;
      gap: 12px;
    }

    .support-grid.two,
    .options-grid.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .option-btn {
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
      background: rgba(12, 24, 50, 0.88);
      cursor: pointer;
      transition: transform 0.14s ease, border-color 0.14s ease, box-shadow 0.14s ease;
      min-height: 92px;
    }

    .option-btn:hover,
    .option-btn:focus-visible {
      transform: translateY(-1px);
      border-color: rgba(96, 165, 250, 0.55);
      box-shadow: 0 10px 24px rgba(15,23,42,0.2);
      outline: none;
    }

    .option-btn.correct { border-color: rgba(52, 211, 153, 0.8); box-shadow: 0 0 0 2px rgba(52, 211, 153, 0.12); }
    .option-btn.wrong { border-color: rgba(251, 113, 133, 0.8); box-shadow: 0 0 0 2px rgba(251, 113, 133, 0.1); }
    .option-btn:disabled { cursor: default; transform: none; }

    .task-foot {
      min-height: 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(15, 23, 42, 0.6);
      font-size: 0.92rem;
    }

    .status.good {
      color: #d1fae5;
      border-color: rgba(52, 211, 153, 0.3);
      background: rgba(6, 78, 59, 0.28);
    }

    .status.bad {
      color: #ffe4e6;
      border-color: rgba(251, 113, 133, 0.3);
      background: rgba(127, 29, 29, 0.22);
    }

    .glossary-btn {
      border: 1px solid var(--line);
      background: rgba(15, 23, 42, 0.72);
      color: var(--text);
      border-radius: 14px;
      min-height: 42px;
      padding: 8px 12px;
      cursor: pointer;
    }

    .glossary-popup {
      position: fixed;
      z-index: 40;
      display: none;
      width: min(320px, calc(100vw - 24px));
      padding: 14px;
      border-radius: 18px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(8, 15, 32, 0.96);
      box-shadow: 0 24px 60px rgba(2, 8, 23, 0.5);
    }

    .glossary-popup.visible { display: grid; gap: 8px; }
    .glossary-popup strong { font-size: 1.08rem; }
    .glossary-popup .muted { color: var(--muted); }

    .result-panel {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(260px, 0.85fr);
      gap: 16px;
    }

    .stat-list {
      display: grid;
      gap: 10px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(15, 23, 42, 0.72);
      color: var(--muted);
    }

    .stat-row strong { color: var(--text); }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%) translateY(16px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
      z-index: 50;
      max-width: min(92vw, 560px);
      padding: 12px 16px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(8, 15, 32, 0.96);
      color: var(--text);
      box-shadow: var(--shadow);
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 760px) {
      .app { padding: 8px; }
      .start-fields,
      .support-grid.two,
      .options-grid.two,
      .result-panel {
        grid-template-columns: 1fr;
      }
      .start-screen,
      .practice-screen,
      .result-screen { padding: 12px; }
    }
  </style>
</head>
<body class="locked-copy notranslate" translate="no">
  <div class="app">
    <div class="shell">
      <section class="screen active start-screen" id="startScreen">
        <div class="top-simple">
          <div class="title">Person description practice</div>
          <div class="mini">45 exercises · 35 definition · 10 true or false</div>
        </div>

        <div class="start-fields">
          <div class="field-wrap">
            <label class="label" for="studentName">Name</label>
            <input class="field" id="studentName" autocomplete="off" spellcheck="false" />
          </div>
          <div class="field-wrap">
            <label class="label" for="studentGroup">Group</label>
            <input class="field" id="studentGroup" autocomplete="off" spellcheck="false" />
          </div>
        </div>

        <button class="btn" id="startBtn" type="button">Start</button>
      </section>

      <section class="screen practice-screen" id="practiceScreen">
        <div class="header-row">
          <span id="progressText">1 / 45</span>
          <span id="scoreText">0 correct</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

        <div class="task-wrap">
          <div class="canvas-box">
            <canvas id="promptCanvas" width="1400" height="260" aria-label="Task"></canvas>
          </div>
          <div class="support-grid" id="supportGrid"></div>
          <div class="options-grid" id="optionsGrid"></div>
        </div>

        <div class="task-foot">
          <div id="statusLine"></div>
          <button class="glossary-btn" id="glossaryBtn" type="button">Dictionary</button>
        </div>
      </section>

      <section class="screen result-screen" id="resultScreen">
        <div class="result-panel">
          <div class="result-box">
            <canvas id="resultCanvas" width="1400" height="880" aria-label="Result"></canvas>
          </div>
          <div class="stat-list" id="resultStats"></div>
        </div>
      </section>
    </div>
  </div>

  <div class="glossary-popup" id="glossaryPopup"></div>
  <div class="toast" id="toast"></div>

  
  <script>
    const CONFIG = {
      appVersion: '3.0.0',
      totalTasks: 45,
      trueFalseCount: 10,
      topicValue: 'topic',
      topicDisplay: 'Description of a person',
      storage: {
        state: 'personDescriptionPracticeStateV3',
        shuffle: 'personDescriptionPracticeShuffleV3',
        submittedPrefix: 'personDescriptionPracticeSubmittedV3:'
      },
      form: {
        actionUrl: 'https://docs.google.com/forms/d/e/1FAIpQLSeUzYUvQbbzo_1r81AacP6Kj7HlKDzEVfa93Dam39LiVjcItA/viewform?usp=pp_url',
        fields: {
          name: 'entry.1582931880',
          group: 'entry.1222434157',
          topic: 'entry.371289786',
          payload: 'entry.679064514'
        }
      }
    };

    const WORD_BANK = {
      hairLength: ['short', 'medium-length', 'long'],
      hairColor: ['black', 'brown', 'blonde', 'red', 'gray'],
      hairType: ['straight', 'wavy', 'curly', 'messy', 'bald'],
      lips: ['thin', 'full'],
      height: ['tall', 'short'],
      body: ['slim', 'thin', 'athletic', 'strong', 'chubby', 'average']
    };

    const DEFINITION_BANK = [
      { answer: 'short', prompt: 'Choose the word: hair that is not long.', options: ['short', 'long', 'medium-length', 'bald'] },
      { answer: 'medium-length', prompt: 'Choose the word: hair that is not short and not long.', options: ['medium-length', 'short', 'long', 'bald'] },
      { answer: 'long', prompt: 'Choose the word: hair that goes far down.', options: ['long', 'short', 'medium-length', 'bald'] },
      { answer: 'straight', prompt: 'Choose the word: hair with no waves and no curls.', options: ['straight', 'wavy', 'curly', 'messy'] },
      { answer: 'wavy', prompt: 'Choose the word: hair with soft waves.', options: ['wavy', 'straight', 'curly', 'messy'] },
      { answer: 'curly', prompt: 'Choose the word: hair with curls.', options: ['curly', 'straight', 'wavy', 'messy'] },
      { answer: 'messy', prompt: 'Choose the word: hair that is not neat.', options: ['messy', 'straight', 'wavy', 'curly'] },
      { answer: 'bald', prompt: 'Choose the word: a person with no hair.', options: ['bald', 'curly', 'messy', 'long'] },
      { answer: 'thin', prompt: 'Choose the word: lips that are not full.', options: ['thin', 'full', 'tall', 'strong'] },
      { answer: 'full', prompt: 'Choose the word: lips that look big.', options: ['full', 'thin', 'short', 'brown'] },
      { answer: 'tall', prompt: 'Choose the word: a person with much height.', options: ['tall', 'short', 'slim', 'strong'] },
      { answer: 'short', prompt: 'Choose the word: a person who is not tall.', options: ['short', 'tall', 'thin', 'average'] },
      { answer: 'slim', prompt: 'Choose the word: a body that is slim and not big.', options: ['slim', 'chubby', 'strong', 'average'] },
      { answer: 'thin', prompt: 'Choose the word: a very slim body.', options: ['thin', 'strong', 'chubby', 'average'] },
      { answer: 'athletic', prompt: 'Choose the word: a sports body.', options: ['athletic', 'chubby', 'average', 'thin'] },
      { answer: 'strong', prompt: 'Choose the word: a powerful body.', options: ['strong', 'slim', 'average', 'medium-length'] },
      { answer: 'chubby', prompt: 'Choose the word: a body that is a little fat.', options: ['chubby', 'slim', 'athletic', 'thin'] },
      { answer: 'average', prompt: 'Choose the word: a normal body, not very thin and not very chubby.', options: ['average', 'athletic', 'strong', 'slim'] },
      { answer: 'black', prompt: 'Choose the word: very dark hair color.', options: ['black', 'brown', 'blonde', 'gray'] },
      { answer: 'brown', prompt: 'Choose the word: hair color like chocolate.', options: ['brown', 'black', 'blonde', 'red'] },
      { answer: 'blonde', prompt: 'Choose the word: light yellow hair color.', options: ['blonde', 'brown', 'gray', 'red'] },
      { answer: 'red', prompt: 'Choose the word: orange-red hair color.', options: ['red', 'brown', 'black', 'gray'] },
      { answer: 'gray', prompt: 'Choose the word: hair color like silver.', options: ['gray', 'black', 'brown', 'red'] }
    ];

    const NAMES = ['Julia', 'Alex', 'Max', 'Ben', 'Kate', 'Mia', 'Nick', 'Emma', 'Leo', 'Sofia', 'Tom', 'Anna', 'Mark', 'Lina', 'Sam', 'Nora', 'Dan', 'Mary', 'Ira', 'Paul'];
    const CATEGORY_LABELS = { definition: 'Definition', tf: 'True or false' };

    const elements = {
      studentName: document.getElementById('studentName'),
      studentGroup: document.getElementById('studentGroup'),
      startBtn: document.getElementById('startBtn'),
      progressText: document.getElementById('progressText'),
      scoreText: document.getElementById('scoreText'),
      progressFill: document.getElementById('progressFill'),
      promptCanvas: document.getElementById('promptCanvas'),
      supportGrid: document.getElementById('supportGrid'),
      optionsGrid: document.getElementById('optionsGrid'),
      statusLine: document.getElementById('statusLine'),
      glossaryBtn: document.getElementById('glossaryBtn'),
      glossaryPopup: document.getElementById('glossaryPopup'),
      toast: document.getElementById('toast'),
      resultCanvas: document.getElementById('resultCanvas'),
      resultStats: document.getElementById('resultStats'),
      startScreen: document.getElementById('startScreen'),
      practiceScreen: document.getElementById('practiceScreen'),
      resultScreen: document.getElementById('resultScreen')
    };

    let dictionary = {};
    let toastTimer = null;
    let answerLocked = false;
    let nextTimer = null;
    const canvasHits = new WeakMap();
    let appState = createEmptyState();

    function createEmptyState() {
      return {
        sessionId: '',
        seed: 0,
        startedAt: null,
        completedAt: null,
        student: { name: '', group: '' },
        tasks: [],
        currentIndex: 0,
        results: [],
        score: { correct: 0 },
        stage: 'idle',
        currentTaskStartedAt: null,
        lastVisibilityShuffleAt: null,
        submission: { sent: false, inFlight: false, sentAt: null, message: '' },
        autosavedAt: null
      };
    }

    function nowIso() { return new Date().toISOString(); }
    function simpleId() { return `${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`; }
    function randomSeed() { return Math.floor(Math.random() * 2147483646) + 1; }
    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function choice(list, rnd) { return list[Math.floor(rnd() * list.length)]; }
    function shuffle(list, rnd) {
      const arr = [...list];
      for (let i = arr.length - 1; i > 0; i -= 1) {
        const j = Math.floor(rnd() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
    function mulberry32(seed) {
      let a = seed >>> 0;
      return function () {
        a |= 0;
        a = (a + 0x6D2B79F5) | 0;
        let t = Math.imul(a ^ (a >>> 15), 1 | a);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function normalizeKey(value) {
      return String(value || '')
        .toLowerCase()
        .replace(/[“”"'.,!?;:()]/g, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function createPerson(rnd, forcedName = null) {
      const hairType = choice(WORD_BANK.hairType, rnd);
      const person = {
        name: forcedName || choice(NAMES, rnd),
        hairType,
        hairLength: hairType === 'bald' ? null : choice(WORD_BANK.hairLength, rnd),
        hairColor: hairType === 'bald' ? null : choice(WORD_BANK.hairColor, rnd),
        lips: choice(WORD_BANK.lips, rnd),
        height: choice(WORD_BANK.height, rnd),
        body: choice(WORD_BANK.body, rnd)
      };
      return person;
    }

    function hairText(person) {
      if (person.hairType === 'bald') return 'bald';
      return `${person.hairLength} ${person.hairColor} ${person.hairType} hair`;
    }

    function personLines(person) {
      return [
        person.name,
        `Hair: ${hairText(person)}`,
        `Lips: ${person.lips}`,
        `Height: ${person.height}`,
        `Body: ${person.body}`
      ];
    }

    function statementFromPerson(person, rnd) {
      const modes = ['hair', 'lips', 'height', 'body'];
      const mode = choice(modes, rnd);
      const makeFalse = rnd() < 0.45;
      let statement = '';
      let correct = true;

      if (mode === 'hair') {
        if (person.hairType === 'bald') {
          const value = makeFalse ? choice(['curly hair', 'wavy hair', 'long hair', 'brown hair'], rnd) : 'bald';
          correct = value === 'bald';
          statement = `${person.name} is ${value}.`;
        } else {
          const actual = `${person.hairLength} ${person.hairColor} ${person.hairType} hair`;
          if (!makeFalse) {
            statement = `${person.name} has ${actual}.`;
            correct = true;
          } else {
            const wrongColor = choice(WORD_BANK.hairColor.filter((x) => x !== person.hairColor), rnd);
            statement = `${person.name} has ${person.hairLength} ${wrongColor} ${person.hairType} hair.`;
            correct = false;
          }
        }
      } else if (mode === 'lips') {
        const value = makeFalse ? (person.lips === 'thin' ? 'full' : 'thin') : person.lips;
        statement = `${person.name} has ${value} lips.`;
        correct = value === person.lips;
      } else if (mode === 'height') {
        const value = makeFalse ? (person.height === 'tall' ? 'short' : 'tall') : person.height;
        statement = `${person.name} is ${value}.`;
        correct = value === person.height;
      } else {
        const value = makeFalse ? choice(WORD_BANK.body.filter((x) => x !== person.body), rnd) : person.body;
        statement = `${person.name} has a ${value} body.`;
        correct = value === person.body;
      }

      return { statement, correct };
    }

    function buildDefinitionTask(rnd) {
      const item = { ...choice(DEFINITION_BANK, rnd) };
      const options = shuffle(item.options, rnd);
      return {
        id: simpleId(),
        type: 'definition',
        prompt: item.prompt,
        supportCards: [],
        options: options.map((text) => ({ kind: 'word', text })),
        correctIndex: options.indexOf(item.answer),
        glossaryText: `${item.prompt} ${options.join(' ')}`
      };
    }

    function buildTrueFalseTask(rnd) {
      const person = createPerson(rnd);
      const details = statementFromPerson(person, rnd);
      return {
        id: simpleId(),
        type: 'tf',
        prompt: `True or false? ${details.statement}`,
        supportCards: [{ kind: 'support', lines: personLines(person) }],
        options: [{ kind: 'word', text: 'True' }, { kind: 'word', text: 'False' }],
        correctIndex: details.correct ? 0 : 1,
        glossaryText: `True or false? ${details.statement} ${personLines(person).join(' ')}`
      };
    }

    function createTaskSet(seed) {
      const rnd = mulberry32(seed);
      const tasks = [];
      const tfPositions = new Set(shuffle([...Array(CONFIG.totalTasks).keys()], rnd).slice(0, CONFIG.trueFalseCount));
      for (let i = 0; i < CONFIG.totalTasks; i += 1) {
        const task = tfPositions.has(i) ? buildTrueFalseTask(rnd) : buildDefinitionTask(rnd);
        task.number = i + 1;
        tasks.push(task);
      }
      return tasks;
    }

    function buildOneTask(seedValue, typeHint = null) {
      const rnd = mulberry32(seedValue);
      if (typeHint === 'tf') return buildTrueFalseTask(rnd);
      if (typeHint === 'definition') return buildDefinitionTask(rnd);
      return rnd() < 0.25 ? buildTrueFalseTask(rnd) : buildDefinitionTask(rnd);
    }

    function persistState() {
      appState.autosavedAt = nowIso();
      localStorage.setItem(CONFIG.storage.state, JSON.stringify(appState));
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(CONFIG.storage.state);
        return raw ? JSON.parse(raw) : null;
      } catch (e) {
        return null;
      }
    }

    function setShuffleFlag(reason) {
      if (appState.stage !== 'running') return;
      const payload = { sessionId: appState.sessionId, index: appState.currentIndex, reason, at: nowIso() };
      localStorage.setItem(CONFIG.storage.shuffle, JSON.stringify(payload));
      persistState();
    }

    function consumeShuffleFlag() {
      try {
        const raw = localStorage.getItem(CONFIG.storage.shuffle);
        if (!raw) return null;
        localStorage.removeItem(CONFIG.storage.shuffle);
        return JSON.parse(raw);
      } catch (e) {
        localStorage.removeItem(CONFIG.storage.shuffle);
        return null;
      }
    }

    function setScreen(name) {
      elements.startScreen.classList.toggle('active', name === 'start');
      elements.practiceScreen.classList.toggle('active', name === 'practice');
      elements.resultScreen.classList.toggle('active', name === 'result');
    }

    function showToast(text) {
      elements.toast.textContent = text;
      elements.toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => elements.toast.classList.remove('show'), 2200);
    }

    function setStatus(text, kind = '') {
      elements.statusLine.innerHTML = '';
      const span = document.createElement('span');
      span.className = `status ${kind}`.trim();
      span.textContent = text;
      elements.statusLine.appendChild(span);
    }

    function useRetinaCanvas(canvas, logicalWidth = null, logicalHeight = null) {
      const ratio = Math.max(window.devicePixelRatio || 1, 1);
      const width = logicalWidth || Number(canvas.getAttribute('width')) || canvas.clientWidth || 1000;
      const height = logicalHeight || Number(canvas.getAttribute('height')) || 200;
      canvas.width = Math.round(width * ratio);
      canvas.height = Math.round(height * ratio);
      const ctx = canvas.getContext('2d');
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      return { ctx, width, height };
    }

    function roundedRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function fillGradient(ctx, w, h, a, b) {
      const g = ctx.createLinearGradient(0, 0, w, h);
      g.addColorStop(0, a);
      g.addColorStop(1, b);
      return g;
    }

    function wrapLines(ctx, text, maxWidth) {
      const words = String(text).split(/\s+/).filter(Boolean);
      const lines = [];
      let line = '';
      for (const word of words) {
        const test = line ? `${line} ${word}` : word;
        if (ctx.measureText(test).width > maxWidth && line) {
          lines.push(line);
          line = word;
        } else {
          line = test;
        }
      }
      if (line) lines.push(line);
      return lines;
    }

    function normalizeDictionary(raw) {
      const out = {};
      if (Array.isArray(raw)) {
        raw.forEach((item) => {
          const key = normalizeKey(item.Word || item.word || item.term);
          if (!key) return;
          out[key] = {
            translation: item.Translation || item.translation || '',
            emoji: item.Emoji || item.emoji || '',
            category: item.Category || item.category || 'word',
            example: item.Example || item.example || ''
          };
        });
      } else if (raw && typeof raw === 'object') {
        Object.entries(raw).forEach(([key, value]) => {
          const clean = normalizeKey(key);
          if (!clean) return;
          if (typeof value === 'string') {
            out[clean] = { translation: value, emoji: '', category: 'word', example: '' };
          } else {
            out[clean] = {
              translation: value.Translation || value.translation || value.hint || '',
              emoji: value.Emoji || value.emoji || '',
              category: value.Category || value.category || 'word',
              example: value.Example || value.example || ''
            };
          }
        });
      }
      return out;
    }

    async function loadDictionary() {
      try {
        const response = await fetch('words.json', { cache: 'no-store' });
        if (!response.ok) throw new Error('words.json not found');
        dictionary = normalizeDictionary(await response.json());
      } catch (e) {
        dictionary = {};
      }
    }

    function storeHits(canvas, hits) {
      canvasHits.set(canvas, hits || []);
    }

    function renderTextBlock(canvas, text, opts = {}) {
      const logicalHeight = opts.height || 200;
      const { ctx, width, height } = useRetinaCanvas(canvas, opts.width || 1400, logicalHeight);
      const hits = [];
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = fillGradient(ctx, width, height, 'rgba(12,24,50,0.96)', 'rgba(6,16,36,0.96)');
      roundedRect(ctx, 0, 0, width, height, 22);
      ctx.fill();
      ctx.strokeStyle = 'rgba(148,163,184,0.14)';
      roundedRect(ctx, 0.5, 0.5, width - 1, height - 1, 22);
      ctx.stroke();

      const padX = opts.padX || 28;
      let y = opts.startY || 48;

      if (opts.badge) {
        ctx.font = '700 18px Inter, system-ui, sans-serif';
        const badgeWidth = ctx.measureText(opts.badge).width + 26;
        ctx.fillStyle = 'rgba(34,211,238,0.14)';
        roundedRect(ctx, padX, y - 24, badgeWidth, 34, 17);
        ctx.fill();
        ctx.strokeStyle = 'rgba(34,211,238,0.24)';
        roundedRect(ctx, padX, y - 24, badgeWidth, 34, 17);
        ctx.stroke();
        ctx.fillStyle = '#7dd3fc';
        ctx.fillText(opts.badge, padX + 13, y - 1);
        y += 26;
      }

      ctx.font = `${opts.fontWeight || 800} ${opts.fontSize || 26}px Inter, system-ui, sans-serif`;
      const lineHeight = opts.lineHeight || 38;
      const lines = wrapLines(ctx, text, width - padX * 2);
      const fontSize = Number((ctx.font.match(/(\d+)px/) || [0, 26])[1]);
      const boxHeight = Math.round(fontSize * 1.05) + 12;
      const interactive = opts.interactive !== false;
      lines.forEach((line) => {
        let x = padX;
        const words = line.split(/\s+/).filter(Boolean);
        const space = ctx.measureText(' ').width;
        words.forEach((word) => {
          const normalized = normalizeKey(word);
          const dictItem = dictionary[normalized];
          const widthWord = ctx.measureText(word).width;
          ctx.fillStyle = dictItem ? '#7dd3fc' : (opts.color || '#eef6ff');
          ctx.fillText(word, x, y);
          if (dictItem) {
            ctx.strokeStyle = 'rgba(125,211,252,0.8)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x, y + 6);
            ctx.lineTo(x + widthWord, y + 6);
            ctx.stroke();
            if (interactive) {
              hits.push({ term: normalized, data: dictItem, x, y: y - boxHeight + 2, width: widthWord, height: boxHeight + 10 });
            }
          }
          x += widthWord + space;
        });
        y += lineHeight;
      });
      storeHits(canvas, hits);
    }

    function renderOptionCanvas(canvas, option, index, state = 'idle') {
      const height = 96;
      const { ctx, width, height: logicalHeight } = useRetinaCanvas(canvas, 900, height);
      ctx.clearRect(0, 0, width, logicalHeight);
      const bg = state === 'correct'
        ? ['rgba(6,78,59,0.88)', 'rgba(5,60,47,0.96)']
        : state === 'wrong'
          ? ['rgba(127,29,29,0.84)', 'rgba(88,28,43,0.96)']
          : ['rgba(14,27,56,0.95)', 'rgba(8,16,36,0.96)'];
      ctx.fillStyle = fillGradient(ctx, width, logicalHeight, bg[0], bg[1]);
      roundedRect(ctx, 0, 0, width, logicalHeight, 20);
      ctx.fill();
      ctx.strokeStyle = 'rgba(148,163,184,0.14)';
      roundedRect(ctx, 0.5, 0.5, width - 1, logicalHeight - 1, 20);
      ctx.stroke();

      ctx.fillStyle = 'rgba(125,211,252,0.18)';
      roundedRect(ctx, 18, 18, 42, 42, 15);
      ctx.fill();
      ctx.fillStyle = '#bae6fd';
      ctx.font = '800 22px Inter, system-ui, sans-serif';
      ctx.fillText(String.fromCharCode(65 + index), 32, 47);

      ctx.fillStyle = '#eef6ff';
      ctx.font = '800 26px Inter, system-ui, sans-serif';
      const lines = wrapLines(ctx, option.text, width - 110);
      let y = logicalHeight / 2 - ((lines.length - 1) * 16);
      lines.forEach((line) => {
        ctx.fillText(line, 82, y);
        y += 32;
      });
      storeHits(canvas, []);
    }

    function renderSupportCanvas(canvas, lines) {
      renderTextBlock(canvas, lines.join('  '), {
        width: 1200,
        height: 150,
        fontSize: 22,
        lineHeight: 32,
        interactive: true,
        color: '#dbeafe'
      });
    }

    function renderPrompt(task) {
      const badge = task.type === 'tf' ? CATEGORY_LABELS.tf : CATEGORY_LABELS.definition;
      renderTextBlock(elements.promptCanvas, task.prompt, {
        badge,
        height: task.type === 'tf' ? 180 : 160,
        fontSize: 24,
        lineHeight: 34,
        interactive: true
      });
    }

    function updateProgress() {
      const done = appState.results.length;
      elements.progressText.textContent = `${Math.min(appState.currentIndex + 1, CONFIG.totalTasks)} / ${CONFIG.totalTasks}`;
      elements.scoreText.textContent = `${appState.score.correct} correct`;
      const pct = CONFIG.totalTasks ? Math.round((done / CONFIG.totalTasks) * 100) : 0;
      elements.progressFill.style.width = `${pct}%`;
    }

    function renderTask() {
      const task = appState.tasks[appState.currentIndex];
      if (!task) return;
      clearTimeout(nextTimer);
      answerLocked = false;
      appState.currentTaskStartedAt = nowIso();
      renderPrompt(task);

      elements.supportGrid.innerHTML = '';
      if (task.supportCards && task.supportCards.length) {
        elements.supportGrid.className = 'support-grid';
        task.supportCards.forEach((card) => {
          const wrapper = document.createElement('div');
          wrapper.className = 'support-box';
          const canvas = document.createElement('canvas');
          wrapper.appendChild(canvas);
          elements.supportGrid.appendChild(wrapper);
          renderSupportCanvas(canvas, card.lines);
          canvas.addEventListener('click', handleCanvasClick);
        });
      } else {
        elements.supportGrid.className = 'support-grid';
      }

      elements.optionsGrid.innerHTML = '';
      elements.optionsGrid.className = task.options.length <= 2 ? 'options-grid' : 'options-grid two';
      task.options.forEach((option, index) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'option-btn';
        const canvas = document.createElement('canvas');
        button.appendChild(canvas);
        button.addEventListener('click', () => answerTask(index));
        elements.optionsGrid.appendChild(button);
        renderOptionCanvas(canvas, option, index, 'idle');
      });

      updateProgress();
      setStatus(task.type === 'tf' ? 'Choose True or False' : 'Choose the correct word');
      persistState();
    }

    function answerTask(selectedIndex) {
      if (answerLocked) return;
      const task = appState.tasks[appState.currentIndex];
      if (!task) return;
      answerLocked = true;
      const buttons = [...elements.optionsGrid.querySelectorAll('.option-btn')];
      const isCorrect = selectedIndex === task.correctIndex;
      const latencyMs = Math.max(0, Date.now() - new Date(appState.currentTaskStartedAt || nowIso()).getTime());
      if (isCorrect) appState.score.correct += 1;
      appState.results.push({ taskId: task.id, type: task.type, correct: isCorrect, latencyMs });

      buttons.forEach((btn, idx) => {
        btn.disabled = true;
        btn.classList.toggle('correct', idx === task.correctIndex);
        btn.classList.toggle('wrong', idx === selectedIndex && !isCorrect);
        const canvas = btn.querySelector('canvas');
        renderOptionCanvas(canvas, task.options[idx], idx, idx === task.correctIndex ? 'correct' : idx === selectedIndex && !isCorrect ? 'wrong' : 'idle');
      });

      setStatus(isCorrect ? 'Correct' : 'Saved', isCorrect ? 'good' : 'bad');
      if (appState.results.length >= CONFIG.totalTasks) {
        persistState();
        nextTimer = setTimeout(() => finishSession(), 700);
        return;
      }

      appState.currentIndex = appState.results.length;
      persistState();
      updateProgress();
      nextTimer = setTimeout(() => advanceTask(), 700);
    }

    function advanceTask() {
      if (appState.results.length >= CONFIG.totalTasks) {
        finishSession();
        return;
      }
      appState.currentIndex = appState.results.length;
      renderTask();
    }

    function replaceCurrentTask() {
      if (appState.stage !== 'running') return;
      const oldTask = appState.tasks[appState.currentIndex];
      const replacementSeed = randomSeed() + appState.currentIndex + appState.results.length;
      const replacement = buildOneTask(replacementSeed, oldTask?.type === 'tf' ? 'tf' : 'definition');
      replacement.number = appState.currentIndex + 1;
      if (oldTask) replacement.replacedFrom = oldTask.id;
      appState.tasks[appState.currentIndex] = replacement;
      appState.lastVisibilityShuffleAt = nowIso();
      persistState();
      renderTask();
      showToast('Current task changed after leaving the page.');
    }

    function resultPayload() {
      return {
        sessionId: appState.sessionId,
        version: CONFIG.appVersion,
        student: appState.student,
        topic: CONFIG.topicValue,
        startedAt: appState.startedAt,
        completedAt: appState.completedAt,
        summary: {
          totalTasks: appState.results.length,
          correct: appState.score.correct,
          accuracy: appState.results.length ? Number(((appState.score.correct / appState.results.length) * 100).toFixed(2)) : 0
        },
        results: appState.results.map((r) => ({ taskId: r.taskId, type: r.type, correct: r.correct, latencyMs: r.latencyMs }))
      };
    }

    function finishSession() {
      appState.stage = 'complete';
      appState.completedAt = nowIso();
      persistState();
      setScreen('result');
      renderResults();
      submitResultsOnce().catch(() => null);
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderResults() {
      const payload = resultPayload();
      const accuracy = payload.summary.accuracy;
      const { ctx, width, height } = useRetinaCanvas(elements.resultCanvas, 1400, 880);
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = fillGradient(ctx, width, height, 'rgba(12,24,50,0.98)', 'rgba(6,16,36,0.98)');
      roundedRect(ctx, 0, 0, width, height, 22);
      ctx.fill();
      ctx.strokeStyle = 'rgba(148,163,184,0.14)';
      roundedRect(ctx, 0.5, 0.5, width - 1, height - 1, 22);
      ctx.stroke();

      ctx.fillStyle = 'rgba(34,211,238,0.14)';
      roundedRect(ctx, 42, 36, 210, 38, 18);
      ctx.fill();
      ctx.strokeStyle = 'rgba(34,211,238,0.24)';
      roundedRect(ctx, 42, 36, 210, 38, 18);
      ctx.stroke();
      ctx.fillStyle = '#7dd3fc';
      ctx.font = '700 18px Inter, system-ui, sans-serif';
      ctx.fillText('Final screenshot', 58, 61);

      ctx.fillStyle = '#f8fafc';
      ctx.font = '800 46px Inter, system-ui, sans-serif';
      ctx.fillText('Person Description Practice', 42, 126);

      ctx.fillStyle = '#a8b7d2';
      ctx.font = '700 24px Inter, system-ui, sans-serif';
      ctx.fillText(`Name: ${appState.student.name}`, 42, 184);
      ctx.fillText(`Group: ${appState.student.group}`, 42, 222);
      ctx.fillText(`Mode: 35 definition + 10 true/false`, 42, 260);
      ctx.fillText(`Finished: ${appState.completedAt ? new Date(appState.completedAt).toLocaleString() : '—'}`, 42, 298);

      const boxX = width - 360;
      ctx.fillStyle = 'rgba(15,23,42,0.76)';
      roundedRect(ctx, boxX, 52, 300, 190, 24);
      ctx.fill();
      ctx.strokeStyle = 'rgba(148,163,184,0.14)';
      roundedRect(ctx, boxX, 52, 300, 190, 24);
      ctx.stroke();
      ctx.fillStyle = '#7dd3fc';
      ctx.font = '700 22px Inter, system-ui, sans-serif';
      ctx.fillText('Result', boxX + 28, 98);
      ctx.fillStyle = '#f8fafc';
      ctx.font = '800 72px Inter, system-ui, sans-serif';
      ctx.fillText(`${Math.round(accuracy)}%`, boxX + 24, 176);
      ctx.fillStyle = '#a8b7d2';
      ctx.font = '700 24px Inter, system-ui, sans-serif';
      ctx.fillText(`${appState.score.correct} / ${appState.results.length} correct`, boxX + 28, 214);

      const stats = [
        ['Tasks', String(appState.results.length)],
        ['Correct', String(appState.score.correct)],
        ['JSON', 'results only'],
        ['Submit', appState.submission.sent ? 'sent once' : appState.submission.inFlight ? 'sending' : 'pending']
      ];

      let y = 370;
      stats.forEach(([label, value], idx) => {
        const x = idx % 2 === 0 ? 42 : 440;
        const rowY = idx < 2 ? y : y + 160;
        ctx.fillStyle = 'rgba(15,23,42,0.76)';
        roundedRect(ctx, x, rowY, 340, 130, 22);
        ctx.fill();
        ctx.strokeStyle = 'rgba(148,163,184,0.14)';
        roundedRect(ctx, x, rowY, 340, 130, 22);
        ctx.stroke();
        ctx.fillStyle = '#a8b7d2';
        ctx.font = '700 22px Inter, system-ui, sans-serif';
        ctx.fillText(label, x + 24, rowY + 42);
        ctx.fillStyle = '#f8fafc';
        ctx.font = '800 36px Inter, system-ui, sans-serif';
        ctx.fillText(value, x + 24, rowY + 88);
      });

      elements.resultStats.innerHTML = '';
      const rows = [
        ['Name', appState.student.name],
        ['Group', appState.student.group],
        ['Correct', `${appState.score.correct} / ${appState.results.length}`],
        ['Accuracy', `${Math.round(accuracy)}%`],
        ['Submission', appState.submission.sent ? 'Sent once' : appState.submission.inFlight ? 'Sending…' : 'Pending']
      ];
      rows.forEach(([label, value]) => {
        const row = document.createElement('div');
        row.className = 'stat-row';
        row.innerHTML = `<span>${escapeHtml(label)}</span><strong>${escapeHtml(value)}</strong>`;
        elements.resultStats.appendChild(row);
      });
    }

    function openGlossary(term, data, clientX, clientY) {
      const emoji = data.emoji ? `${data.emoji} ` : '';
      const popup = elements.glossaryPopup;
      popup.innerHTML = `
        <strong>${escapeHtml(term)}</strong>
        <div class="muted">${escapeHtml((data.category || 'word'))}</div>
        <div>${escapeHtml(`${emoji}${data.translation || ''}`)}</div>
        ${data.example ? `<div class="muted">${escapeHtml(data.example)}</div>` : ''}
      `;
      popup.classList.add('visible');
      const rect = popup.getBoundingClientRect();
      const left = clamp(clientX + 10, 10, window.innerWidth - rect.width - 10);
      const top = clamp(clientY + 10, 10, window.innerHeight - rect.height - 10);
      popup.style.left = `${left}px`;
      popup.style.top = `${top}px`;
    }

    function closeGlossary() { elements.glossaryPopup.classList.remove('visible'); }

    function handleCanvasClick(event) {
      const canvas = event.currentTarget;
      const hits = canvasHits.get(canvas) || [];
      if (!hits.length) return closeGlossary();
      const rect = canvas.getBoundingClientRect();
      const scaleX = ((canvas.width / (window.devicePixelRatio || 1)) || rect.width) / rect.width;
      const scaleY = ((canvas.height / (window.devicePixelRatio || 1)) || rect.height) / rect.height;
      const x = (event.clientX - rect.left) * scaleX;
      const y = (event.clientY - rect.top) * scaleY;
      const hit = hits.find((item) => x >= item.x && x <= item.x + item.width && y >= item.y && y <= item.y + item.height);
      if (!hit) return closeGlossary();
      openGlossary(hit.term, hit.data, event.clientX, event.clientY);
    }

    function showFirstGlossary() {
      const hits = canvasHits.get(elements.promptCanvas) || [];
      if (!hits.length) return showToast('No dictionary word here.');
      const rect = elements.glossaryBtn.getBoundingClientRect();
      openGlossary(hits[0].term, hits[0].data, rect.left + rect.width / 2, rect.top - 6);
    }

    function normalizeFormAction(url) {
      if (!url) return '';
      if (url.includes('/formResponse')) return url;
      return url.replace('/viewform', '/formResponse').split('?')[0];
    }

    function alreadySubmitted(sessionId) {
      return localStorage.getItem(`${CONFIG.storage.submittedPrefix}${sessionId}`) === '1';
    }

    async function submitResultsOnce() {
      if (!appState.sessionId || appState.submission.sent || appState.submission.inFlight || alreadySubmitted(appState.sessionId)) {
        appState.submission.sent = appState.submission.sent || alreadySubmitted(appState.sessionId);
        persistState();
        renderResults();
        return;
      }
      const action = normalizeFormAction(CONFIG.form.actionUrl);
      const { name, group, topic, payload } = CONFIG.form.fields;
      if (!action || !name || !group || !topic || !payload) return;

      const finalPayload = JSON.stringify(resultPayload());
      const body = new URLSearchParams();
      body.set(name, appState.student.name);
      body.set(group, appState.student.group);
      body.set(topic, CONFIG.topicValue);
      body.set(payload, finalPayload);

      appState.submission.inFlight = true;
      persistState();
      renderResults();

      try {
        await fetch(action, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
          body
        });
        localStorage.setItem(`${CONFIG.storage.submittedPrefix}${appState.sessionId}`, '1');
        appState.submission.sent = true;
        appState.submission.sentAt = nowIso();
        appState.submission.message = 'sent once';
      } catch (e) {
        appState.submission.message = 'failed';
      } finally {
        appState.submission.inFlight = false;
        persistState();
        renderResults();
      }
    }

    function startSession() {
      const name = elements.studentName.value.trim();
      const group = elements.studentGroup.value.trim();
      if (!name || !group) return showToast('Enter name and group.');

      clearTimeout(nextTimer);
      appState = createEmptyState();
      appState.sessionId = simpleId();
      appState.seed = randomSeed();
      appState.startedAt = nowIso();
      appState.student = { name, group };
      appState.tasks = createTaskSet(appState.seed);
      appState.stage = 'running';
      persistState();
      setScreen('practice');
      renderTask();
    }

    function restoreOrInit() {
      const saved = loadState();
      const shuffleFlag = consumeShuffleFlag();
      if (!saved) {
        appState = createEmptyState();
        setScreen('start');
        return;
      }
      appState = saved;
      elements.studentName.value = appState.student?.name || '';
      elements.studentGroup.value = appState.student?.group || '';

      if (appState.stage === 'complete') {
        setScreen('result');
        renderResults();
        return;
      }

      if (appState.stage === 'running') {
        setScreen('practice');
        if (shuffleFlag && shuffleFlag.sessionId === appState.sessionId) {
          replaceCurrentTask();
        } else {
          renderTask();
        }
        return;
      }

      setScreen('start');
    }

    function registerServiceWorker() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').catch(() => null);
      }
    }

    function bindAntiCopy() {
      const stop = (e) => { e.preventDefault(); return false; };
      ['contextmenu', 'copy', 'cut', 'dragstart', 'selectstart'].forEach((type) => document.addEventListener(type, stop));
      document.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        if ((e.ctrlKey || e.metaKey) && ['c', 'x', 'a', 's', 'u', 'p'].includes(key)) e.preventDefault();
        if (['f12'].includes(key)) e.preventDefault();
      });
    }

    function bindGuards() {
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden') {
          setShuffleFlag('hidden');
        } else if (document.visibilityState === 'visible' && appState.stage === 'running') {
          const saved = loadState();
          if (saved) appState = saved;
          replaceCurrentTask();
        }
      });
      window.addEventListener('pagehide', () => setShuffleFlag('pagehide'));
      window.addEventListener('beforeunload', () => setShuffleFlag('beforeunload'));
      window.addEventListener('offline', () => showToast('Offline. Progress is saved.'));
      window.addEventListener('online', () => showToast('Online again.'));
    }

    function bindEvents() {
      elements.startBtn.addEventListener('click', startSession);
      elements.glossaryBtn.addEventListener('click', showFirstGlossary);
      elements.promptCanvas.addEventListener('click', handleCanvasClick);
      document.addEventListener('click', (e) => {
        if (!elements.glossaryPopup.contains(e.target) && e.target !== elements.glossaryBtn && e.target !== elements.promptCanvas) closeGlossary();
      });
      window.addEventListener('resize', () => {
        if (appState.stage === 'running') renderTask();
        if (appState.stage === 'complete') renderResults();
      });
    }

    async function init() {
      bindAntiCopy();
      bindGuards();
      bindEvents();
      registerServiceWorker();
      await loadDictionary();
      restoreOrInit();
    }

    init();
  </script>

</body>
