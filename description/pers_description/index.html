<!DOCTYPE html>
<html lang="en" translate="no" class="notranslate">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="google" content="notranslate" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <title>Person Description Practice</title>
  <style>
    :root{
      --bg:#eaf1f7;
      --panel:#ffffff;
      --panel-2:#f6f9fc;
      --line:#d7e1ec;
      --text:#17324d;
      --muted:#5f768d;
      --accent:#3aa0ff;
      --accent-2:#1783e6;
      --good:#1fa971;
      --bad:#d4546a;
      --ink:#14314e;
      --chip:#e5f2ff;
      --chip-text:#1568b8;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{
      margin:0;
      min-height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
    }
    body *{user-select:none;-webkit-user-select:none;}
    button,input{font:inherit;}
    .app{min-height:100vh;padding:14px;display:grid;place-items:center;}
    .shell{width:min(860px,100%);background:var(--panel);border:1px solid var(--line);border-radius:24px;overflow:hidden;}
    .screen{display:none;}
    .screen.active{display:block;}
    .start-screen,.practice-screen,.result-screen{padding:18px;display:grid;gap:14px;}
    .title{margin:0;text-align:center;font-size:clamp(1.5rem,3.5vw,2.3rem);font-weight:900;letter-spacing:-0.03em;color:var(--ink);}
    .subtitle{margin:0;text-align:center;color:var(--muted);font-size:.98rem;}
    .fields{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;}
    .field-wrap{display:grid;gap:6px;}
    .label{color:var(--muted);font-size:.9rem;}
    .field{width:100%;border:1px solid var(--line);border-radius:16px;padding:14px 15px;background:#fff;color:var(--ink);outline:none;}
    .field:focus{border-color:#8bc6ff;}
    .btn{border:0;border-radius:16px;min-height:52px;padding:14px 18px;font-weight:800;cursor:pointer;background:var(--accent);color:#fff;}
    .header-row{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;color:var(--muted);font-size:.95rem;}
    .progress-track{width:100%;height:12px;background:#dde8f2;border-radius:999px;overflow:hidden;border:1px solid #d2dde9;}
    .progress-fill{width:0%;height:100%;background:var(--accent);transition:width .2s ease;}
    .panel{border:1px solid var(--line);border-radius:20px;background:var(--panel-2);overflow:hidden;}
    canvas{display:block;width:100%;max-width:100%;image-rendering:-webkit-optimize-contrast;image-rendering:crisp-edges;}
    .chip-row{display:flex;flex-wrap:wrap;gap:8px;}
    .chip{border:1px solid #cfe3f7;background:var(--chip);color:var(--chip-text);border-radius:999px;padding:8px 12px;font-weight:700;cursor:pointer;}
    .options-grid{display:grid;gap:10px;grid-template-columns:repeat(2,minmax(0,1fr));}
    .option-btn{padding:0;border:1px solid var(--line);border-radius:18px;overflow:hidden;background:#fff;cursor:pointer;}
    .status-line{min-height:24px;color:var(--muted);font-size:.95rem;}
    .status.good{color:var(--good);font-weight:800;}
    .status.bad{color:var(--bad);font-weight:800;}
    .result-box{border:2px solid var(--accent);border-radius:22px;background:#fff;padding:22px;display:grid;gap:12px;}
    .result-title{margin:0;text-align:center;font-size:1.8rem;font-weight:900;color:var(--ink);}
    .score-big{text-align:center;font-size:3rem;font-weight:900;color:var(--accent-2);line-height:1;}
    .result-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;}
    .result-item{border:1px solid var(--line);border-radius:16px;background:var(--panel-2);padding:12px;display:grid;gap:4px;}
    .result-item .k{font-size:.85rem;color:var(--muted);}
    .result-item .v{font-size:1.05rem;font-weight:800;color:var(--ink);}
    .popup{position:fixed;inset:auto 12px 12px 12px;z-index:30;display:none;}
    .popup.show{display:block;}
    .popup-card{width:min(520px,100%);margin-left:auto;margin-right:auto;background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px;display:grid;gap:8px;}
    .popup-top{display:flex;justify-content:space-between;align-items:start;gap:10px;}
    .popup-title{font-size:1.1rem;font-weight:900;color:var(--ink);}
    .popup-sub{color:var(--muted);line-height:1.35;}
    .popup-close{border:0;background:#eef4fa;color:var(--ink);width:34px;height:34px;border-radius:10px;cursor:pointer;font-size:1rem;font-weight:900;}
    .toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(20px);background:#17324d;color:#fff;padding:10px 14px;border-radius:999px;opacity:0;pointer-events:none;transition:opacity .18s ease, transform .18s ease;z-index:40;font-weight:700;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    @media (max-width:720px){
      .fields,.result-grid,.options-grid{grid-template-columns:1fr;}
      .start-screen,.practice-screen,.result-screen{padding:14px;}
      .app{padding:10px;}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="shell">
      <section id="startScreen" class="screen start-screen active">
        <h1 class="title">Person description practice</h1>
        <p class="subtitle">20 simple tasks</p>
        <div class="fields">
          <div class="field-wrap">
            <label class="label" for="studentName">Name</label>
            <input id="studentName" class="field" type="text" autocomplete="off" spellcheck="false" />
          </div>
          <div class="field-wrap">
            <label class="label" for="studentGroup">Group</label>
            <input id="studentGroup" class="field" type="text" autocomplete="off" spellcheck="false" />
          </div>
        </div>
        <button id="startBtn" class="btn" type="button">Start</button>
      </section>

      <section id="practiceScreen" class="screen practice-screen">
        <div class="header-row">
          <div id="progressText">1 / 20</div>
          <div id="scoreText">0 correct</div>
        </div>
        <div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>

        <div class="panel"><canvas id="promptCanvas" width="1200" height="220"></canvas></div>
        <div id="chipsRow" class="chip-row"></div>
        <div id="supportWrap" class="panel" style="display:none;"><canvas id="supportCanvas" width="1200" height="96"></canvas></div>
        <div id="optionsGrid" class="options-grid"></div>
        <div id="statusLine" class="status-line"></div>
      </section>

      <section id="resultScreen" class="screen result-screen">
        <div class="result-box">
          <h2 class="result-title">Finished</h2>
          <div id="scoreBig" class="score-big">0 / 20</div>
          <div class="result-grid">
            <div class="result-item"><div class="k">Name</div><div id="resultName" class="v">—</div></div>
            <div class="result-item"><div class="k">Group</div><div id="resultGroup" class="v">—</div></div>
            <div class="result-item"><div class="k">Correct</div><div id="resultCorrect" class="v">0</div></div>
            <div class="result-item"><div class="k">Percent</div><div id="resultPercent" class="v">0%</div></div>
          </div>
          <div class="subtitle">Take a screenshot now.</div>
        </div>
      </section>
    </div>
  </div>

  <div id="popup" class="popup">
    <div class="popup-card">
      <div class="popup-top">
        <div>
          <div id="popupTitle" class="popup-title">word</div>
          <div id="popupBody" class="popup-sub"></div>
        </div>
        <button id="popupClose" class="popup-close" type="button">×</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const CONFIG = {
      appVersion: '3.1.0',
      totalTasks: 20,
      topicValue: 'topic',
      topicDisplay: 'Description of a person',
      storage: {
        state: 'personDescriptionPracticeStateV31',
        shuffle: 'personDescriptionPracticeShuffleV31',
        submittedPrefix: 'personDescriptionPracticeSubmittedV31:'
      },
      form: {
        actionUrl: 'https://docs.google.com/forms/d/e/1FAIpQLSeUzYUvQbbzo_1r81AacP6Kj7HlKDzEVfa93Dam39LiVjcItA/formResponse',
        fields: {
          name: 'entry.1582931880',
          group: 'entry.1222434157',
          topic: 'entry.371289786',
          payload: 'entry.679064514'
        }
      }
    };

    const elements = {
      startScreen: document.getElementById('startScreen'),
      practiceScreen: document.getElementById('practiceScreen'),
      resultScreen: document.getElementById('resultScreen'),
      studentName: document.getElementById('studentName'),
      studentGroup: document.getElementById('studentGroup'),
      startBtn: document.getElementById('startBtn'),
      progressText: document.getElementById('progressText'),
      scoreText: document.getElementById('scoreText'),
      progressFill: document.getElementById('progressFill'),
      promptCanvas: document.getElementById('promptCanvas'),
      supportCanvas: document.getElementById('supportCanvas'),
      supportWrap: document.getElementById('supportWrap'),
      chipsRow: document.getElementById('chipsRow'),
      optionsGrid: document.getElementById('optionsGrid'),
      statusLine: document.getElementById('statusLine'),
      resultName: document.getElementById('resultName'),
      resultGroup: document.getElementById('resultGroup'),
      resultCorrect: document.getElementById('resultCorrect'),
      resultPercent: document.getElementById('resultPercent'),
      scoreBig: document.getElementById('scoreBig'),
      popup: document.getElementById('popup'),
      popupTitle: document.getElementById('popupTitle'),
      popupBody: document.getElementById('popupBody'),
      popupClose: document.getElementById('popupClose'),
      toast: document.getElementById('toast')
    };

    let dictionary = {};
    const canvasHits = new WeakMap();
    let toastTimer = null;
    let answerLocked = false;

    const appState = {
      stage: 'start',
      studentName: '',
      studentGroup: '',
      sessionId: '',
      seed: 0,
      currentIndex: 0,
      score: { correct: 0 },
      results: [],
      tasks: [],
      usedTaskIds: [],
      submitDone: false,
      currentTaskStartedAt: null,
      autosavedAt: null
    };

    const DEFINITION_BANK = [
      { id:'def-wavy', prompt:'Which word means: hair with waves?', options:['wavy','straight','curly','bald'], answer:'wavy', terms:['which','word','means','hair','waves','wavy','straight','curly','bald'] },
      { id:'def-curly', prompt:'Which word means: hair in small circles?', options:['curly','wavy','straight','messy'], answer:'curly', terms:['which','word','means','hair','small','circles','curly','wavy','straight','messy'] },
      { id:'def-straight', prompt:'Which word means: hair with no waves?', options:['straight','wavy','curly','messy'], answer:'straight', terms:['which','word','means','hair','no','waves','straight','wavy','curly','messy'] },
      { id:'def-bald', prompt:'Which word means: no hair?', options:['bald','long','short','curly'], answer:'bald', terms:['which','word','means','no','hair','bald','long','short','curly'] },
      { id:'def-messy', prompt:'Which word means: hair not neat?', options:['messy','straight','full','tall'], answer:'messy', terms:['which','word','means','hair','not','neat','messy','straight','full','tall'] },
      { id:'def-full', prompt:'Which word means: big lips?', options:['full','thin','long','average'], answer:'full', terms:['which','word','means','big','lips','full','thin','long','average'] },
      { id:'def-thin', prompt:'Which word means: small lips?', options:['thin','full','strong','short'], answer:'thin', terms:['which','word','means','small','lips','thin','full','strong','short'] },
      { id:'def-tall', prompt:'Which word means: high height?', options:['tall','short','slim','wavy'], answer:'tall', terms:['which','word','means','high','height','tall','short','slim','wavy'] },
      { id:'def-athletic', prompt:'Which word means: body good for sport?', options:['athletic','chubby','average','thin'], answer:'athletic', terms:['which','word','means','body','good','sport','athletic','chubby','average','thin'] },
      { id:'def-strong', prompt:'Which word means: body with muscles?', options:['strong','slim','average','messy'], answer:'strong', terms:['which','word','means','body','muscles','strong','slim','average','messy'] },
      { id:'def-chubby', prompt:'Which word means: body a little fat?', options:['chubby','athletic','thin','straight'], answer:'chubby', terms:['which','word','means','body','little','fat','chubby','athletic','thin','straight'] },
      { id:'def-average', prompt:'Which word means: normal body?', options:['average','strong','bald','full'], answer:'average', terms:['which','word','means','normal','body','average','strong','bald','full'] },
      { id:'def-long', prompt:'Which word means: not short hair?', options:['long','bald','thin','full'], answer:'long', terms:['which','word','means','not','short','hair','long','bald','thin','full'] },
      { id:'def-short', prompt:'Which word means: not tall?', options:['short','tall','curly','strong'], answer:'short', terms:['which','word','means','not','tall','short','curly','strong'] },
      { id:'def-slim', prompt:'Which word means: body thin and nice?', options:['slim','chubby','strong','messy'], answer:'slim', terms:['which','word','means','body','thin','nice','slim','chubby','strong','messy'] }
    ];

    const TRUE_FALSE_BANK = [
      { id:'tf1', statement:'Long means not short.', answer:true, terms:['true','false','long','means','not','short'] },
      { id:'tf2', statement:'Thin lips are big lips.', answer:false, terms:['true','false','thin','lips','big','full'] },
      { id:'tf3', statement:'Bald means no hair.', answer:true, terms:['true','false','bald','means','no','hair'] },
      { id:'tf4', statement:'Athletic is a body type.', answer:true, terms:['true','false','athletic','body','type'] },
      { id:'tf5', statement:'Curly hair is straight hair.', answer:false, terms:['true','false','curly','hair','straight'] },
      { id:'tf6', statement:'Tall is the opposite of short.', answer:true, terms:['true','false','tall','opposite','short'] },
      { id:'tf7', statement:'Messy hair is very neat hair.', answer:false, terms:['true','false','messy','hair','neat'] },
      { id:'tf8', statement:'Chubby means very slim.', answer:false, terms:['true','false','chubby','slim'] },
      { id:'tf9', statement:'Full lips are not thin lips.', answer:true, terms:['true','false','full','lips','thin'] },
      { id:'tf10', statement:'Wavy hair has waves.', answer:true, terms:['true','false','wavy','hair','waves'] },
      { id:'tf11', statement:'Average body means normal body.', answer:true, terms:['true','false','average','body','normal'] },
      { id:'tf12', statement:'Strong body means weak body.', answer:false, terms:['true','false','strong','body','weak'] },
      { id:'tf13', statement:'Short can talk about height.', answer:true, terms:['true','false','short','height'] },
      { id:'tf14', statement:'Slim means a little fat.', answer:false, terms:['true','false','slim','little','fat'] },
      { id:'tf15', statement:'Straight hair has no waves.', answer:true, terms:['true','false','straight','hair','waves'] }
    ];

    function nowIso() { return new Date().toISOString(); }
    function randomSeed() { return Math.floor(Date.now() + Math.random() * 1000000); }
    function normalizeKey(value) {
      return String(value || '')
        .toLowerCase()
        .replace(/[“”"'.,!?;:()]/g, '')
        .replace(/-/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }
    function mulberry32(seed) {
      let a = seed >>> 0;
      return function() {
        a |= 0;
        a = (a + 0x6D2B79F5) | 0;
        let t = Math.imul(a ^ (a >>> 15), 1 | a);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }
    function shuffle(list, rnd) {
      const arr = [...list];
      for (let i = arr.length - 1; i > 0; i -= 1) {
        const j = Math.floor(rnd() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
    function useRetinaCanvas(canvas, logicalWidth, logicalHeight) {
      const ratio = Math.max(window.devicePixelRatio || 1, 1);
      canvas.width = Math.round(logicalWidth * ratio);
      canvas.height = Math.round(logicalHeight * ratio);
      const ctx = canvas.getContext('2d');
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      return { ctx, width: logicalWidth, height: logicalHeight };
    }
    function roundedRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }
    function wrapLines(ctx, text, maxWidth) {
      const words = String(text).split(/\s+/).filter(Boolean);
      const lines = [];
      let line = '';
      for (const word of words) {
        const test = line ? `${line} ${word}` : word;
        if (ctx.measureText(test).width > maxWidth && line) {
          lines.push(line);
          line = word;
        } else {
          line = test;
        }
      }
      if (line) lines.push(line);
      return lines;
    }
    function normalizeDictionary(raw) {
      const out = {};
      const addItem = (key, value) => {
        const clean = normalizeKey(key);
        if (!clean) return;
        out[clean] = {
          translation: value.translation || value.Translation || value.hint || '',
          emoji: value.emoji || value.Emoji || '',
          example: value.example || value.Example || ''
        };
      };
      if (Array.isArray(raw)) {
        raw.forEach((item) => addItem(item.Word || item.word || item.term, item));
      } else if (raw && typeof raw === 'object') {
        Object.entries(raw).forEach(([key, value]) => {
          if (typeof value === 'string') addItem(key, { translation: value });
          else addItem(key, value || {});
        });
      }
      return out;
    }
    async function loadDictionary() {
      try {
        const response = await fetch('words.json', { cache: 'no-store' });
        if (!response.ok) throw new Error('no words');
        dictionary = normalizeDictionary(await response.json());
      } catch (e) {
        dictionary = {};
      }
    }
    function storeHits(canvas, hits) { canvasHits.set(canvas, hits || []); }
    function renderTextBlock(canvas, text, options = {}) {
      const height = options.height || 180;
      const { ctx, width } = useRetinaCanvas(canvas, 1200, height);
      const hits = [];
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = '#f6f9fc';
      roundedRect(ctx, 0, 0, width, height, 20);
      ctx.fill();
      ctx.strokeStyle = '#d7e1ec';
      roundedRect(ctx, 0.5, 0.5, width - 1, height - 1, 20);
      ctx.stroke();

      const padX = 26;
      let y = 42;
      if (options.badge) {
        ctx.fillStyle = '#e5f2ff';
        roundedRect(ctx, padX, 16, 126, 32, 16);
        ctx.fill();
        ctx.fillStyle = '#1568b8';
        ctx.font = '800 18px Inter, system-ui, sans-serif';
        ctx.fillText(options.badge, padX + 14, 37);
        y = 78;
      }

      ctx.fillStyle = '#14314e';
      ctx.font = `${options.weight || 900} ${options.fontSize || 24}px Inter, system-ui, sans-serif`;
      const lineHeight = options.lineHeight || 34;
      const lines = wrapLines(ctx, text, width - padX * 2);
      const boxHeight = (options.fontSize || 24) + 14;
      lines.forEach((line) => {
        let x = padX;
        const words = line.split(/\s+/).filter(Boolean);
        const space = ctx.measureText(' ').width;
        words.forEach((word) => {
          const normalized = normalizeKey(word);
          const dictItem = dictionary[normalized];
          const wordWidth = ctx.measureText(word).width;
          ctx.fillStyle = dictItem ? '#1976d2' : '#14314e';
          ctx.fillText(word, x, y);
          if (dictItem) {
            ctx.strokeStyle = '#1976d2';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x, y + 5);
            ctx.lineTo(x + wordWidth, y + 5);
            ctx.stroke();
            hits.push({ term: normalized, data: dictItem, x, y: y - boxHeight + 2, width: wordWidth, height: boxHeight + 8 });
          }
          x += wordWidth + space;
        });
        y += lineHeight;
      });
      storeHits(canvas, hits);
    }
    function renderOptionCanvas(canvas, option, index, state='idle') {
      const height = 92;
      const { ctx, width } = useRetinaCanvas(canvas, 900, height);
      ctx.clearRect(0, 0, width, height);
      const fill = state === 'correct' ? '#e7f8f1' : state === 'wrong' ? '#fff0f3' : '#ffffff';
      const border = state === 'correct' ? '#9ddbbf' : state === 'wrong' ? '#efb2be' : '#d7e1ec';
      const labelFill = state === 'correct' ? '#1fa971' : state === 'wrong' ? '#d4546a' : '#e5f2ff';
      const labelText = state === 'correct' || state === 'wrong' ? '#ffffff' : '#1568b8';
      roundedRect(ctx, 0, 0, width, height, 18);
      ctx.fillStyle = fill;
      ctx.fill();
      ctx.strokeStyle = border;
      roundedRect(ctx, 0.5, 0.5, width - 1, height - 1, 18);
      ctx.stroke();

      ctx.fillStyle = labelFill;
      roundedRect(ctx, 18, 21, 42, 42, 14);
      ctx.fill();
      ctx.fillStyle = labelText;
      ctx.font = '800 22px Inter, system-ui, sans-serif';
      ctx.fillText(String.fromCharCode(65 + index), 32, 48);

      ctx.fillStyle = '#14314e';
      ctx.font = '900 28px Inter, system-ui, sans-serif';
      const lines = wrapLines(ctx, option, width - 100);
      let y = height / 2 - ((lines.length - 1) * 16);
      lines.forEach((line) => {
        ctx.fillText(line, 82, y);
        y += 32;
      });
      storeHits(canvas, []);
    }
    function setScreen(name) {
      elements.startScreen.classList.toggle('active', name === 'start');
      elements.practiceScreen.classList.toggle('active', name === 'practice');
      elements.resultScreen.classList.toggle('active', name === 'result');
    }
    function showToast(text) {
      elements.toast.textContent = text;
      elements.toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => elements.toast.classList.remove('show'), 1800);
    }
    function setStatus(text, kind='') {
      elements.statusLine.innerHTML = '';
      const span = document.createElement('span');
      span.className = `status ${kind}`.trim();
      span.textContent = text;
      elements.statusLine.appendChild(span);
    }
    function buildInitialTasks(seed) {
      const rnd = mulberry32(seed);
      const defs = shuffle(DEFINITION_BANK, rnd).slice(0, 10).map((item) => ({
        id: item.id,
        baseId: item.id,
        type: 'definition',
        prompt: item.prompt,
        options: shuffle(item.options, rnd),
        answer: item.answer,
        terms: item.terms,
        support: 'Choose one word.'
      }));
      const tfs = shuffle(TRUE_FALSE_BANK, rnd).slice(0, 10).map((item) => ({
        id: item.id,
        baseId: item.id,
        type: 'truefalse',
        prompt: `True or False: ${item.statement}`,
        options: ['True', 'False'],
        answer: item.answer ? 'True' : 'False',
        terms: item.terms,
        support: 'Read and check the meaning.'
      }));
      return shuffle([...defs, ...tfs], rnd).map((task, index) => ({
        ...task,
        number: index + 1,
        correctIndex: task.options.indexOf(task.answer)
      }));
    }
    function availableBankForType(type) {
      return type === 'definition' ? DEFINITION_BANK : TRUE_FALSE_BANK;
    }
    function makeReplacementTask(type, usedBaseIds) {
      const bank = availableBankForType(type);
      const free = bank.filter((item) => !usedBaseIds.includes(item.id));
      const source = free.length ? free[Math.floor(Math.random() * free.length)] : bank[Math.floor(Math.random() * bank.length)];
      const rnd = mulberry32(randomSeed());
      const options = type === 'definition' ? shuffle(source.options, rnd) : ['True', 'False'];
      const answer = type === 'definition' ? source.answer : (source.answer ? 'True' : 'False');
      return {
        id: `${source.id}-r-${Date.now().toString(36)}`,
        baseId: source.id,
        type,
        prompt: type === 'definition' ? source.prompt : `True or False: ${source.statement}`,
        options,
        answer,
        terms: source.terms,
        support: type === 'definition' ? 'Choose one word.' : 'Read and check the meaning.',
        correctIndex: options.indexOf(answer)
      };
    }
    function persistState() {
      appState.autosavedAt = nowIso();
      localStorage.setItem(CONFIG.storage.state, JSON.stringify(appState));
    }
    function loadState() {
      try {
        const raw = localStorage.getItem(CONFIG.storage.state);
        return raw ? JSON.parse(raw) : null;
      } catch (e) {
        return null;
      }
    }
    function setShuffleFlag(reason) {
      if (appState.stage !== 'running') return;
      localStorage.setItem(CONFIG.storage.shuffle, JSON.stringify({
        sessionId: appState.sessionId,
        index: appState.currentIndex,
        reason,
        at: nowIso()
      }));
      persistState();
    }
    function consumeShuffleFlag() {
      try {
        const raw = localStorage.getItem(CONFIG.storage.shuffle);
        if (!raw) return null;
        localStorage.removeItem(CONFIG.storage.shuffle);
        return JSON.parse(raw);
      } catch (e) {
        localStorage.removeItem(CONFIG.storage.shuffle);
        return null;
      }
    }
    function deriveKeywords(task) {
      const set = new Set((task.terms || []).map(normalizeKey).filter(Boolean));
      task.options.forEach((item) => {
        const clean = normalizeKey(item);
        if (clean && dictionary[clean]) set.add(clean);
      });
      return [...set].filter((item) => dictionary[item]);
    }
    function renderKeywords(task) {
      elements.chipsRow.innerHTML = '';
      deriveKeywords(task).forEach((term) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'chip';
        btn.textContent = term;
        btn.addEventListener('click', () => openDictionary(term, dictionary[term]));
        elements.chipsRow.appendChild(btn);
      });
    }
    function openDictionary(term, entry) {
      if (!entry) return;
      const parts = [];
      if (entry.emoji) parts.push(entry.emoji);
      if (entry.translation) parts.push(entry.translation);
      if (entry.example) parts.push(entry.example);
      elements.popupTitle.textContent = term;
      elements.popupBody.textContent = parts.join('  •  ') || 'No note';
      elements.popup.classList.add('show');
    }
    function closeDictionary() { elements.popup.classList.remove('show'); }
    function bindCanvasClicks(canvas) {
      canvas.addEventListener('click', (event) => {
        const hits = canvasHits.get(canvas) || [];
        if (!hits.length) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = (canvas.width / (window.devicePixelRatio || 1)) / rect.width;
        const scaleY = (canvas.height / (window.devicePixelRatio || 1)) / rect.height;
        const x = (event.clientX - rect.left) * scaleX;
        const y = (event.clientY - rect.top) * scaleY;
        const hit = hits.find((item) => x >= item.x && x <= item.x + item.width && y >= item.y && y <= item.y + item.height);
        if (hit) openDictionary(hit.term, hit.data);
      });
    }
    function updateProgress() {
      const done = appState.results.length;
      elements.progressText.textContent = `${Math.min(appState.currentIndex + 1, CONFIG.totalTasks)} / ${CONFIG.totalTasks}`;
      elements.scoreText.textContent = `${appState.score.correct} correct`;
      const pct = Math.round((done / CONFIG.totalTasks) * 100);
      elements.progressFill.style.width = `${pct}%`;
    }
    function renderTask() {
      const task = appState.tasks[appState.currentIndex];
      if (!task) return;
      answerLocked = false;
      appState.currentTaskStartedAt = nowIso();
      renderTextBlock(elements.promptCanvas, task.prompt, {
        badge: task.type === 'definition' ? 'Definition' : 'True / False',
        height: 180,
        fontSize: 24,
        lineHeight: 34
      });
      elements.supportWrap.style.display = 'block';
      renderTextBlock(elements.supportCanvas, task.support, {
        height: 86,
        fontSize: 20,
        lineHeight: 28,
        weight: 800
      });
      renderKeywords(task);

      elements.optionsGrid.innerHTML = '';
      task.options.forEach((option, index) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'option-btn';
        const canvas = document.createElement('canvas');
        button.appendChild(canvas);
        button.addEventListener('click', () => answerTask(index));
        elements.optionsGrid.appendChild(button);
        renderOptionCanvas(canvas, option, index, 'idle');
      });

      updateProgress();
      setStatus('Tap blue words for help');
      persistState();
    }
    function answerTask(selectedIndex) {
      if (answerLocked) return;
      const task = appState.tasks[appState.currentIndex];
      if (!task) return;
      answerLocked = true;
      const isCorrect = selectedIndex === task.correctIndex;
      const latencyMs = Math.max(0, Date.now() - new Date(appState.currentTaskStartedAt || nowIso()).getTime());
      if (isCorrect) appState.score.correct += 1;
      [...elements.optionsGrid.querySelectorAll('.option-btn')].forEach((btn, index) => {
        const canvas = btn.querySelector('canvas');
        const state = index === task.correctIndex ? 'correct' : (index === selectedIndex && !isCorrect ? 'wrong' : 'idle');
        renderOptionCanvas(canvas, task.options[index], index, state);
        btn.disabled = true;
      });
      appState.results.push({
        taskId: task.id,
        baseId: task.baseId,
        type: task.type,
        correct: isCorrect,
        selectedIndex,
        latencyMs
      });
      if (!appState.usedTaskIds.includes(task.baseId)) appState.usedTaskIds.push(task.baseId);
      persistState();
      setStatus(isCorrect ? 'Correct' : 'Wrong', isCorrect ? 'good' : 'bad');

      setTimeout(() => {
        appState.currentIndex += 1;
        if (appState.currentIndex >= CONFIG.totalTasks) {
          appState.stage = 'finished';
          persistState();
          submitResultsOnce();
          renderResult();
          setScreen('result');
        } else {
          renderTask();
        }
      }, 600);
    }
    function replaceCurrentTask() {
      if (appState.stage !== 'running') return;
      const current = appState.tasks[appState.currentIndex];
      if (!current) return;
      const replacement = makeReplacementTask(current.type, appState.usedTaskIds);
      replacement.number = appState.currentIndex + 1;
      appState.tasks[appState.currentIndex] = replacement;
      persistState();
      if (document.visibilityState === 'visible') {
        renderTask();
        showToast('Task changed');
      }
    }
    function renderResult() {
      const correct = appState.score.correct;
      const percent = Math.round((correct / CONFIG.totalTasks) * 100);
      elements.scoreBig.textContent = `${correct} / ${CONFIG.totalTasks}`;
      elements.resultName.textContent = appState.studentName || '—';
      elements.resultGroup.textContent = appState.studentGroup || '—';
      elements.resultCorrect.textContent = String(correct);
      elements.resultPercent.textContent = `${percent}%`;
    }
    function buildPayload() {
      const percent = Math.round((appState.score.correct / CONFIG.totalTasks) * 100);
      return {
        appVersion: CONFIG.appVersion,
        sessionId: appState.sessionId,
        name: appState.studentName,
        group: appState.studentGroup,
        topic: CONFIG.topicValue,
        totalTasks: CONFIG.totalTasks,
        correct: appState.score.correct,
        percent,
        finishedAt: nowIso(),
        results: appState.results.map((item, idx) => ({
          n: idx + 1,
          type: item.type,
          correct: item.correct,
          ms: item.latencyMs
        }))
      };
    }
    function submitResultsOnce() {
      if (appState.submitDone || !appState.sessionId) return;
      const key = `${CONFIG.storage.submittedPrefix}${appState.sessionId}`;
      if (localStorage.getItem(key) === '1') {
        appState.submitDone = true;
        persistState();
        return;
      }
      const payload = buildPayload();
      const formData = new URLSearchParams();
      formData.set(CONFIG.form.fields.name, appState.studentName);
      formData.set(CONFIG.form.fields.group, appState.studentGroup);
      formData.set(CONFIG.form.fields.topic, CONFIG.topicValue);
      formData.set(CONFIG.form.fields.payload, JSON.stringify(payload));
      try {
        if (navigator.sendBeacon) {
          const blob = new Blob([formData.toString()], { type: 'application/x-www-form-urlencoded;charset=UTF-8' });
          navigator.sendBeacon(CONFIG.form.actionUrl, blob);
        } else {
          fetch(CONFIG.form.actionUrl, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
            body: formData.toString()
          }).catch(() => {});
        }
      } catch (e) {}
      localStorage.setItem(key, '1');
      appState.submitDone = true;
      persistState();
    }
    function startNewSession() {
      const name = elements.studentName.value.trim();
      const group = elements.studentGroup.value.trim();
      if (!name || !group) {
        showToast('Enter name and group');
        return;
      }
      appState.stage = 'running';
      appState.studentName = name;
      appState.studentGroup = group;
      appState.sessionId = `${Date.now().toString(36)}-${Math.random().toString(36).slice(2,8)}`;
      appState.seed = randomSeed();
      appState.currentIndex = 0;
      appState.score = { correct: 0 };
      appState.results = [];
      appState.usedTaskIds = [];
      appState.submitDone = false;
      appState.tasks = buildInitialTasks(appState.seed);
      persistState();
      setScreen('practice');
      renderTask();
    }
    function restoreFromSaved(saved) {
      Object.assign(appState, saved);
      elements.studentName.value = appState.studentName || '';
      elements.studentGroup.value = appState.studentGroup || '';
      if (appState.stage === 'finished') {
        renderResult();
        setScreen('result');
      } else if (appState.stage === 'running') {
        setScreen('practice');
        const flag = consumeShuffleFlag();
        if (flag && flag.sessionId === appState.sessionId) replaceCurrentTask();
        else renderTask();
      } else {
        setScreen('start');
      }
    }
    function registerServiceWorker() {
      if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
    function installProtection() {
      document.addEventListener('contextmenu', (e) => e.preventDefault());
      document.addEventListener('copy', (e) => e.preventDefault());
      document.addEventListener('cut', (e) => e.preventDefault());
      document.addEventListener('dragstart', (e) => e.preventDefault());
      document.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        if ((e.ctrlKey || e.metaKey) && ['c','x','s','u','p','a'].includes(key)) e.preventDefault();
      }, true);
      window.addEventListener('beforeunload', () => { if (appState.stage === 'running') setShuffleFlag('beforeunload'); });
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState !== 'visible') {
          if (appState.stage === 'running') setShuffleFlag('hidden');
        } else {
          const flag = consumeShuffleFlag();
          if (flag && flag.sessionId === appState.sessionId && appState.stage === 'running') replaceCurrentTask();
        }
      });
      window.addEventListener('offline', () => { persistState(); showToast('Offline mode'); });
      window.addEventListener('online', () => showToast('Online'));
    }

    bindCanvasClicks(elements.promptCanvas);
    bindCanvasClicks(elements.supportCanvas);
    elements.popupClose.addEventListener('click', closeDictionary);
    elements.popup.addEventListener('click', (e) => { if (e.target === elements.popup) closeDictionary(); });
    elements.startBtn.addEventListener('click', startNewSession);

    (async function init() {
      await loadDictionary();
      registerServiceWorker();
      installProtection();
      const saved = loadState();
      if (saved && saved.sessionId && saved.stage && Array.isArray(saved.tasks)) restoreFromSaved(saved);
      else setScreen('start');
    })();
  </script>
</body>
</html>
