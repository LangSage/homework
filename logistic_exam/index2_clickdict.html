    let dictionaryMap = new Map();
    let dictionaryMaxPhraseLength = 1;
    let popupHideTimer = null;


    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }


    function normalizeDictKey(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/[’]/g, "'")
        .replace(/[^a-z0-9'\- ]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function rebuildDictionaryPhraseLength() {
      dictionaryMaxPhraseLength = 1;
      dictionaryMap.forEach((_, key) => {
        const size = key.split(" ").filter(Boolean).length;
        if (size > dictionaryMaxPhraseLength) dictionaryMaxPhraseLength = size;
      });
    }

    function seedCoreDictionary() {
      dictionaryMap = new Map();
      CORE_DICTIONARY.forEach((entry) => {
        const key = normalizeDictKey(entry.word);
        if (!key) return;
        dictionaryMap.set(key, {
          word: entry.word,
          translation: entry.translation,
          emoji: entry.emoji || "📘"
        });
      });
      rebuildDictionaryPhraseLength();
    }

    async function loadExternalDictionary() {
      try {
        const response = await fetch("words.json", { cache: "no-store" });
        if (!response.ok) return;
        const rows = await response.json();
        rows.forEach((row) => {
          const key = normalizeDictKey(row && row.Word);
          if (!key || !row || !row.Translation || dictionaryMap.has(key)) return;
          dictionaryMap.set(key, {
            word: String(row.Word),
            translation: String(row.Translation),
            emoji: row.Emoji || "📘"
          });
        });
        rebuildDictionaryPhraseLength();
      } catch (e) {}

      if (state && !state.done && state.presented && state.presented[state.current]) {
        renderTaskTextCanvases(state.presented[state.current]);
      }
    }

    function buildTextLayout(text, maxWidth, fontSpec) {
      const raw = String(text || "").trim();
      const measureCanvas = document.createElement("canvas");
      const ctx = measureCanvas.getContext("2d");
      ctx.font = fontSpec;

      if (!raw) {
        return {
          lines: [[{ raw: "", width: 0 }]],
          spaceWidth: ctx.measureText(" ").width
        };
      }

      const tokens = raw.split(/\s+/).map((token) => ({
        raw: token,
        width: ctx.measureText(token).width
      }));

      const lines = [];
      let currentLine = [];
      let currentText = "";

      tokens.forEach((token) => {
        const nextText = currentText ? currentText + " " + token.raw : token.raw;
        if (currentText && ctx.measureText(nextText).width > maxWidth) {
          lines.push(currentLine);
          currentLine = [token];
          currentText = token.raw;
        } else {
          currentLine.push(token);
          currentText = nextText;
        }
      });

      if (currentLine.length) lines.push(currentLine);

      return {
        lines,
        spaceWidth: ctx.measureText(" ").width
      };
    }

    function drawTextCanvas(canvas, text, config = {}) {
      if (!canvas) return null;

      const {
        width = null,
        fontSize = 22,
        fontWeight = 700,
        color = "#f8fafc",
        lineHeight = 1.28,
        paddingX = 0,
        paddingY = 0,
        fontFamily = "Arial, sans-serif",
        minWidth = 100
      } = config;

      const hostWidth = width || canvas.parentElement?.clientWidth || 320;
      const innerWidth = Math.max(minWidth, Math.floor(hostWidth - paddingX * 2));
      const ratio = window.devicePixelRatio || 1;
      const fontSpec = `${fontWeight} ${fontSize}px ${fontFamily}`;
      const layout = buildTextLayout(text, innerWidth, fontSpec);
      const linePx = Math.max(fontSize + 6, Math.round(fontSize * lineHeight));
      const cssWidth = innerWidth + paddingX * 2;
      const cssHeight = Math.max(linePx, layout.lines.length * linePx + paddingY * 2);

      canvas.width = Math.max(1, Math.floor(cssWidth * ratio));
      canvas.height = Math.max(1, Math.floor(cssHeight * ratio));
      canvas.style.width = cssWidth + "px";
      canvas.style.height = cssHeight + "px";

      const ctx = canvas.getContext("2d");
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.scale(ratio, ratio);

      ctx.font = fontSpec;
      ctx.fillStyle = color;
      ctx.textBaseline = "top";

      layout.lines.forEach((line, index) => {
        const lineText = line.map((item) => item.raw).join(" ");
        ctx.fillText(lineText, paddingX, paddingY + index * linePx);
      });

      canvas.__textLayout = {
        lines: layout.lines,
        linePx,
        paddingX,
        paddingY,
        spaceWidth: layout.spaceWidth
      };

      return canvas.__textLayout;
    }

    function hideDictionaryPopup() {
      const popup = document.getElementById("dictPopup");
      if (!popup) return;
      popup.classList.add("opacity-0", "translate-y-3", "pointer-events-none");
      popup.classList.remove("opacity-100", "translate-y-0");
    }

    function showDictionaryPopup(entry) {
      const popup = document.getElementById("dictPopup");
      if (!popup || !entry) return;

      const emojiNode = popup.querySelector('[data-role="emoji"]');
      const wordNode = popup.querySelector('[data-role="word"]');
      const translationNode = popup.querySelector('[data-role="translation"]');

      if (emojiNode) emojiNode.textContent = entry.emoji || "📘";
      if (wordNode) wordNode.textContent = entry.word || "";
      if (translationNode) translationNode.textContent = entry.translation || "";

      popup.classList.remove("opacity-0", "translate-y-3", "pointer-events-none");
      popup.classList.add("opacity-100", "translate-y-0");

      clearTimeout(popupHideTimer);
      popupHideTimer = setTimeout(hideDictionaryPopup, 2600);
    }

    function renderDictionaryHotspots(canvas, overlay) {
      if (!canvas || !overlay) return;

      overlay.innerHTML = "";
      overlay.style.width = canvas.style.width || "100%";
      overlay.style.height = canvas.style.height || "100%";

      const layout = canvas.__textLayout;
      if (!layout || !dictionaryMap.size) return;

      const fragment = document.createDocumentFragment();

      layout.lines.forEach((line, lineIndex) => {
        let x = layout.paddingX;
        let index = 0;

        while (index < line.length) {
          let matchedEntry = null;
          let matchedLen = 0;
          const maxLen = Math.min(dictionaryMaxPhraseLength, line.length - index);

          for (let len = maxLen; len >= 1; len--) {
            const phrase = line.slice(index, index + len).map((item) => item.raw).join(" ");
            const key = normalizeDictKey(phrase);
            if (key && dictionaryMap.has(key)) {
              matchedEntry = dictionaryMap.get(key);
              matchedLen = len;
              break;
            }
          }

          if (matchedEntry) {
            const wordGroup = line.slice(index, index + matchedLen);
            const width = wordGroup.reduce((sum, item) => sum + item.width, 0) + layout.spaceWidth * (matchedLen - 1);

            const button = document.createElement("button");
            button.type = "button";
            button.className = "dict-word-hitbox";
            button.style.left = `${x}px`;
            button.style.top = `${layout.paddingY + lineIndex * layout.linePx}px`;
            button.style.width = `${Math.max(18, width)}px`;
            button.style.height = `${layout.linePx}px`;
            button.setAttribute("aria-label", `Show translation for ${matchedEntry.word}`);
            button.addEventListener("click", (event) => {
              event.preventDefault();
              event.stopPropagation();
              showDictionaryPopup(matchedEntry);
            });

            fragment.appendChild(button);
            x += width + layout.spaceWidth;
            index += matchedLen;
          } else {
            x += line[index].width + layout.spaceWidth;
            index += 1;
          }
        }
      });

      overlay.appendChild(fragment);
    }

    function renderTaskTextCanvases(task) {
      requestAnimationFrame(() => {
        const promptCanvas = document.getElementById("promptCanvas");
        if (promptCanvas) {
          const promptWidth = promptCanvas.parentElement?.clientWidth || 560;
          drawTextCanvas(promptCanvas, task.prompt, {
            width: promptWidth,
            fontSize: window.innerWidth < 640 ? 24 : 32,
            fontWeight: 700,
            lineHeight: 1.18,
            paddingY: 2
          });
          renderDictionaryHotspots(promptCanvas, document.getElementById("promptOverlay"));
        }

        document.querySelectorAll(".option-canvas").forEach((canvas) => {
          const idx = Number(canvas.dataset.idx);
          const button = canvas.closest("button");
          const available = Math.max(140, (button?.clientWidth || 320) - 78);

          drawTextCanvas(canvas, task.options[idx].text, {
            width: available,
            fontSize: window.innerWidth < 640 ? 18 : 20,
            fontWeight: 600,
            lineHeight: 1.24
          });

          renderDictionaryHotspots(canvas, canvas.nextElementSibling);
        });
      });
    }

    function now() {

      return Date.now();
    }

    function safeEncode(str) {
      return btoa(unescape(encodeURIComponent(str)));
    }

    function safeDecode(str) {
      return decodeURIComponent(escape(atob(str)));
    }

    function setCookie(name, value, days = 7) {
      const expires = new Date(Date.now() + days * 86400000).toUTCString();
      document.cookie = `${name}=${encodeURIComponent(value)}; expires=${expires}; path=/; SameSite=Lax`;
    }

    function getCookie(name) {
      const key = name + "=";
      const parts = document.cookie.split(";").map(v => v.trim());
      for (const part of parts) {
        if (part.indexOf(key) === 0) return decodeURIComponent(part.substring(key.length));
      }
      return null;
    }

    function clearCookie(name) {
      document.cookie = `${name}=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; SameSite=Lax`;
    }

    function saveState() {
      if (!state) return;
      const raw = JSON.stringify(state);
      try { localStorage.setItem(STORAGE_KEY, raw); } catch (e) {}
      try { setCookie(COOKIE_KEY, safeEncode(raw), 7); } catch (e) {}
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);
      } catch (e) {}
      try {
        const fromCookie = getCookie(COOKIE_KEY);
        if (fromCookie) return JSON.parse(safeDecode(fromCookie));
      } catch (e) {}
      return null;
    }

    function clearState() {
      try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
      clearCookie(COOKIE_KEY);
      state = null;
    }

    function getTaskById(id) {
      return TASK_BANK.find(t => t.id === id);
    }

    function makePresentedTask(task) {
      if (task.type === "mcq") {
        const options = task.options.map((text, idx) => ({ text, correct: idx === task.answer }));
        return {
          id: task.id,
          type: task.type,
          prompt: task.prompt,
          image: IMG_BASE + task.image,
          options: shuffle(options)
        };
      }
      if (task.type === "true_false") {
        return {
          id: task.id,
          type: task.type,
          prompt: task.prompt,
          image: IMG_BASE + task.image,
          options: shuffle([
            { text: "True", value: true, correct: task.statement === true },
            { text: "False", value: false, correct: task.statement === false }
          ])
        };
      }
      if (task.type === "multi2") {
        const options = task.options.map((text, idx) => ({ text, idx, correct: task.answers.includes(idx) }));
        return {
          id: task.id,
          type: task.type,
          prompt: task.prompt,
          image: IMG_BASE + task.image,
          options: shuffle(options)
        };
      }
      return null;
    }

    function buildPresentedList(mode) {
      const ids = shuffle(TASK_BANK.map(t => t.id));
      const count = FULL_MODE_COUNT;
      return ids.slice(0, count).map(id => makePresentedTask(getTaskById(id)));
    }

    function normalizeGroup(value) {
      return GROUP_OPTIONS.includes(value) ? value : GROUP_OPTIONS[0];
    }

    function getStudentProfile() {
      try {
        const raw = localStorage.getItem(PROFILE_STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          return {
            name: (parsed.name || "").trim(),
            group: normalizeGroup(parsed.group || GROUP_OPTIONS[0])
          };
        }
      } catch (e) {}
      return { name: "", group: GROUP_OPTIONS[0] };
    }

    function saveStudentProfile(name, group) {
      const profile = {
        name: (name || "").trim(),
        group: normalizeGroup(group || GROUP_OPTIONS[0])
      };
      try { localStorage.setItem(PROFILE_STORAGE_KEY, JSON.stringify(profile)); } catch (e) {}
      return profile;

    function startQuiz(mode) {
      const profile = getStudentProfile();
      const studentName = profile.name;
      const studentGroup = profile.group;

      state = {
        version: 1,
        pageId: PAGE_ID,
        mode,
        active: true,
        done: false,
        sent: false,
        current: 0,
        correct: 0,
        leaveCount: 0,
        startedAt: now(),
        finishedAt: null,
        lastPenaltyAt: 0,
        studentName,
        studentGroup,
        answers: [],
        selection: [],
        presented: buildPresentedList(mode),
        resultJson: ""
      };
      saveState();
      render();
    }

    function getUnusedTaskIds() {
      const used = new Set((state?.presented || []).map(t => t.id));
      return TASK_BANK.filter(t => !used.has(t.id)).map(t => t.id);
    }

    function swapCurrentTask() {
      if (!state || state.done) return;
      const currentTask = state.presented[state.current];
      if (!currentTask) return;

      let candidates = getUnusedTaskIds();
      if (!candidates.length) {
        candidates = TASK_BANK
          .filter(t => t.id !== currentTask.id && !state.answers.some(a => a && a.taskId === t.id))
          .map(t => t.id);
      }
      if (!candidates.length) {
        candidates = TASK_BANK.filter(t => t.id !== currentTask.id).map(t => t.id);
      }
      if (!candidates.length) return;

      const newId = shuffle(candidates)[0];
      state.presented[state.current] = makePresentedTask(getTaskById(newId));
      state.selection = [];
    }

    function applyLeavePenalty() {
      if (safeNavigation) return;
      if (!state || state.done || !state.active) return;
      const t = now();
      if (t - (state.lastPenaltyAt || 0) < 1200) return;
      state.lastPenaltyAt = t;
      state.leaveCount += 1;
      swapCurrentTask();
      saveState();
    }

    function buildResultObject(s) {
      const finished = s.finishedAt || now();
      const minutes = Math.max(1, Math.round((finished - s.startedAt) / 60000));
      const total = s.presented.length;
      const wrong = total - s.correct;
      const scorePercent = Math.round((s.correct / total) * 100);
      return {
        pageId: s.pageId,
        mode: s.mode,
        name: s.studentName || "",
        group: s.studentGroup || "",
        total,
        correct: s.correct,
        wrong,
        scorePercent,
        leaveCount: s.leaveCount,
        minutes,
        startedAt: new Date(s.startedAt).toISOString(),
        finishedAt: new Date(finished).toISOString(),
        version: s.version
      };
    }

    function submitHiddenStats() {
      if (!state || !state.done || state.sent) return;
      const resultObj = buildResultObject(state);
      const json = JSON.stringify(resultObj);
      state.resultJson = json;

      const iframe = document.createElement("iframe");
      iframe.name = "hidden_submit_frame_" + Date.now();
      iframe.style.display = "none";
      document.body.appendChild(iframe);

      const form = document.createElement("form");
      form.action = FORM_ACTION;
      form.method = "POST";
      form.target = iframe.name;
      form.style.display = "none";

      const fields = {
        [ENTRY_NAME]: resultObj.name,
        [ENTRY_GROUP]: resultObj.group,
        [ENTRY_JSON]: json
      };

      Object.entries(fields).forEach(([name, value]) => {
        const input = document.createElement("input");
        input.type = "hidden";
        input.name = name;
        input.value = value;
        form.appendChild(input);
      });

      document.body.appendChild(form);
      try {
        form.submit();
        state.sent = true;
        saveState();
      } catch (e) {}

      setTimeout(() => {
        try { form.remove(); } catch (e) {}
        try { iframe.remove(); } catch (e) {}
      }, 4000);
    }

    function finishQuiz() {
      state.done = true;
      state.active = false;
      state.finishedAt = now();
      state.resultJson = JSON.stringify(buildResultObject(state), null, 2);
      saveState();
      submitHiddenStats();
      render();
    }

    function nextAfterAnswer(taskId, payload, isCorrect) {
      state.answers[state.current] = {
        taskId,
        ...payload,
        correct: isCorrect
      };
      if (isCorrect) state.correct += 1;

      if (state.current >= state.presented.length - 1) {
        finishQuiz();
      } else {
        state.current += 1;
        state.selection = [];
        saveState();
        render();
      }
    }

    function answerMcq(optionIndex) {
      if (!state || state.done) return;
      if (state.answers[state.current]) return;

      const task = state.presented[state.current];
      const option = task.options[optionIndex];
      const isCorrect = !!option.correct;
      nextAfterAnswer(task.id, { selected: optionIndex }, isCorrect);
    }

    function toggleMulti(optionIndex) {
      if (!state || state.done) return;
      if (state.answers[state.current]) return;

      const task = state.presented[state.current];
      if (task.type !== "multi2") return;

      const set = new Set(state.selection || []);
      if (set.has(optionIndex)) {
        set.delete(optionIndex);
      } else if (set.size < 2) {
        set.add(optionIndex);
      }
      state.selection = [...set].sort((a,b)=>a-b);
      saveState();
      render();
    }

    function submitMulti() {
      if (!state || state.done) return;
      if (state.answers[state.current]) return;
      const task = state.presented[state.current];
      if (task.type !== "multi2") return;
      if ((state.selection || []).length !== 2) return;

      const correctIndices = task.options
        .map((opt, idx) => opt.correct ? idx : -1)
        .filter(idx => idx !== -1)
        .sort((a,b)=>a-b);
      const selected = [...state.selection].sort((a,b)=>a-b);
      const isCorrect = JSON.stringify(correctIndices) === JSON.stringify(selected);
      nextAfterAnswer(task.id, { selected }, isCorrect);
    }

      if (ratio >= 0.9) return "Dock A";
      if (ratio >= 0.75) return "Dock B";

      return "Dock D";

            }).join("")}
          </div>
          <button id="submitMultiBtn" class="mt-4 w-full rounded-2xl ${((state.selection || []).length === 2) ? 'bg-slate-100 text-slate-900' : 'bg-slate-800 text-slate-500'} px-5 py-4 font-semibold transition">
            OK
          </button>
        `;
      }

      return `
        <div class="mt-6 grid grid-cols-1 gap-3">
          ${task.options.map((opt, idx) => `
            <button data-idx="${idx}" translate="no" class="answer-btn rounded-2xl border border-slate-700 bg-slate-950/70 p-4 sm:p-5 text-left hover:border-sky-500/50 hover:bg-slate-900 transition flex items-start gap-3">
              <span class="mt-0.5 shrink-0 font-semibold text-slate-200">${String.fromCharCode(65 + idx)}.</span>
              <div class="min-w-0 flex-1">
                <div class="dict-canvas-wrap"><canvas class="option-canvas text-canvas" data-idx="${idx}"></canvas><div class="dict-overlay option-overlay" data-idx="${idx}"></div></div>
              </div>
            </button>
          `).join("")}
        </div>
      `;
    }



    function renderQuiz() {
      const app = document.getElementById("app");

      if (state.done) {
        const resultPretty = state.resultJson || JSON.stringify(buildResultObject(state), null, 2);
        const minutes = Math.max(1, Math.round(((state.finishedAt || now()) - state.startedAt) / 60000));

        app.innerHTML = `
          <div class="min-h-screen flex items-center justify-center p-4 sm:p-6">
            <div class="w-full max-w-3xl rounded-3xl border border-slate-800 bg-slate-900/80 backdrop-blur shadow-2xl p-5 sm:p-8">
              <div class="flex items-center justify-between gap-3">
                <div class="inline-flex rounded-full border border-sky-500/30 bg-sky-500/10 px-3 py-1 text-xs sm:text-sm text-sky-300">${getStatusWord(state)}</div>
                <button id="menuBtnResult" class="rounded-2xl border border-slate-700 px-4 py-2 text-sm text-slate-200 hover:bg-slate-800 transition">Main menu</button>
              </div>

              <div class="mt-6 text-center">
                <div class="text-slate-400 text-sm uppercase tracking-[0.25em]">Result</div>
              </div>

              <div class="mt-4 rounded-3xl border border-slate-800 bg-slate-950/70 p-4 sm:p-6 overflow-x-auto">
                <pre class="json-box text-left text-sm sm:text-base text-emerald-300">${resultPretty.replace(/</g, '&lt;')}</pre>
              </div>

              <div class="mt-6 grid grid-cols-3 gap-3 text-center">
                <div class="rounded-2xl border border-slate-800 bg-slate-950/50 p-3">
                  <div class="text-xs text-slate-400">Q</div>
                  <div class="mt-1 text-lg font-bold">${state.presented.length}</div>
                </div>
                <div class="rounded-2xl border border-slate-800 bg-slate-950/50 p-3">
                  <div class="text-xs text-slate-400">T</div>
                  <div class="mt-1 text-lg font-bold">${minutes}m</div>
                </div>
                <div class="rounded-2xl border border-slate-800 bg-slate-950/50 p-3">
                  <div class="text-xs text-slate-400">S</div>
                  <div class="mt-1 text-lg font-bold">${state.leaveCount}</div>
                </div>
              </div>

              <div class="mt-6 flex justify-center gap-3">
                <button id="restartBtn" class="rounded-2xl bg-slate-100 px-5 py-3 text-slate-900 font-semibold hover:bg-white transition">Restart</button>
              </div>
            </div>
          </div>
        `;

        document.getElementById("menuBtnResult").addEventListener("click", goToMenu);
        document.getElementById("restartBtn").addEventListener("click", () => {
          clearState();
          render();
        });
        return;
      }

      const task = state.presented[state.current];
      const progress = Math.round((state.current / state.presented.length) * 100);
      const typeBadge = task.type === "true_false" ? "True / False" : task.type === "multi2" ? "Choose 2" : "Task";

      app.innerHTML = `
        <div class="min-h-screen p-3 sm:p-5 lg:p-8">
          <div class="mx-auto w-full max-w-5xl">
            <div class="rounded-3xl border border-slate-800 bg-slate-900/75 backdrop-blur shadow-2xl overflow-hidden">
              <div class="border-b border-slate-800 p-4 sm:p-5">
                <div class="flex flex-col gap-3">
                  <div class="flex flex-wrap items-center justify-between gap-3">
                    <div class="flex items-center gap-3 flex-wrap">
                      <div class="rounded-2xl border border-sky-500/20 bg-sky-500/10 px-3 py-2 text-sm text-sky-300">Mode ${state.mode}</div>
                      <div class="rounded-2xl border border-slate-700 px-3 py-2 text-sm text-slate-300">${state.current + 1} / ${state.presented.length}</div>
                      ${state.studentName ? `<div class="rounded-2xl border border-slate-700 px-3 py-2 text-sm text-slate-300">${state.studentName.replace(/</g, '&lt;')}</div>` : ''}
                      <div class="rounded-2xl border border-slate-700 px-3 py-2 text-sm text-slate-300">${state.studentGroup || ''}</div>
                    </div>
                    <button id="menuBtnQuiz" class="rounded-2xl border border-slate-700 px-4 py-2 text-sm text-slate-200 hover:bg-slate-800 transition">Main menu</button>
                  </div>
                  <div class="w-full rounded-full bg-slate-800 h-3 overflow-hidden">
                    <div class="h-full rounded-full bg-gradient-to-r from-sky-500 to-emerald-400" style="width:${progress}%"></div>
                  </div>
                </div>
              </div>

              <div class="grid grid-cols-1 lg:grid-cols-[1.05fr_1fr] gap-0">
                <div class="border-b lg:border-b-0 lg:border-r border-slate-800 p-4 sm:p-6">
                  <div class="flex min-h-[240px] sm:min-h-[340px] items-center justify-center rounded-3xl border border-slate-800 bg-slate-950/60 overflow-hidden">
                    <img src="${task.image}" alt="" class="max-h-[320px] sm:max-h-[420px] w-auto max-w-full object-contain" onerror="this.closest('.flex').innerHTML='<div class=\'text-slate-500 text-sm\'>image</div>';" />
                  </div>
                </div>

                <div class="p-4 sm:p-6" translate="no">
                  <div class="inline-flex rounded-full border border-emerald-500/20 bg-emerald-500/10 px-3 py-1 text-xs text-emerald-300">${typeBadge}</div>

                  <div class="mt-4">
                    <div class="dict-canvas-wrap"><canvas id="promptCanvas" class="text-canvas"></canvas><div id="promptOverlay" class="dict-overlay"></div></div>
                    <div class="mt-3 text-xs text-slate-500">Tap underlined words for RU help</div>
                  </div>

                  ${renderOptions(task)}
                </div>
              </div>
            </div>
          </div>
        </div>

        <div id="dictPopup" class="fixed left-1/2 bottom-4 z-50 w-[min(92vw,420px)] -translate-x-1/2 translate-y-3 opacity-0 pointer-events-none transition-all duration-200">
          <div class="rounded-3xl border border-sky-400/30 bg-slate-950/95 shadow-2xl backdrop-blur px-4 py-3">
            <div class="flex items-start gap-3">
              <div data-role="emoji" class="text-2xl leading-none">📘</div>
              <div class="min-w-0 flex-1">
                <div data-role="word" class="text-sm font-semibold text-sky-300"></div>
                <div data-role="translation" class="mt-1 text-sm text-slate-100"></div>
              </div>
              <button id="dictCloseBtn" class="rounded-xl border border-slate-700 px-2 py-1 text-xs text-slate-300 hover:bg-slate-800 transition">✕</button>
            </div>
          </div>
        </div>
      `;

      renderTaskTextCanvases(task);

      document.getElementById("menuBtnQuiz").addEventListener("click", goToMenu);
      const dictCloseBtn = document.getElementById("dictCloseBtn");
      if (dictCloseBtn) dictCloseBtn.addEventListener("click", hideDictionaryPopup);

      if (task.type === "multi2") {
        document.querySelectorAll(".multi-btn").forEach(btn => {
          btn.addEventListener("click", () => toggleMulti(Number(btn.dataset.idx)));
        });
        const submitBtn = document.getElementById("submitMultiBtn");
        if (submitBtn) submitBtn.addEventListener("click", submitMulti);
      } else {
        document.querySelectorAll(".answer-btn").forEach(btn => {
          btn.addEventListener("click", () => answerMcq(Number(btn.dataset.idx)));
        });
      }
    }


    function render() {
      const saved = loadState();
      if (!state && saved) state = saved;
      if (!state) {
        renderStartScreen(saved);
        return;
      }
      if (state.done && !state.sent) submitHiddenStats();
      renderQuiz();
    }

    function blockActions() {
      const blocked = ["copy", "cut", "paste", "contextmenu", "selectstart", "dragstart"];
      blocked.forEach(type => {
        document.addEventListener(type, event => {
          event.preventDefault();
          return false;
        }, { passive: false });
      });

      document.addEventListener("keydown", event => {
        const key = (event.key || "").toLowerCase();
        const combo = event.ctrlKey || event.metaKey;
        if (
          (combo && ["a", "c", "x", "v", "u", "s", "p"].includes(key)) ||
          key === "f12" ||
          (combo && event.shiftKey && ["i", "j", "c", "s"].includes(key))
        ) {
          event.preventDefault();
          event.stopPropagation();
          return false;
        }
      }, { passive: false });
    }

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        applyLeavePenalty();
      } else {
        render();
      }
    });

    window.addEventListener("pagehide", () => {
      applyLeavePenalty();
    });

    window.addEventListener("blur", () => {
      if (document.visibilityState !== "visible") return;
      applyLeavePenalty();
    });


    let canvasResizeTimer = null;
    window.addEventListener("resize", () => {
      clearTimeout(canvasResizeTimer);
      canvasResizeTimer = setTimeout(() => {
        if (state && !state.done && state.presented && state.presented[state.current]) {
          renderTaskTextCanvases(state.presented[state.current]);
        }
      }, 120);
    });

    seedCoreDictionary();
    loadExternalDictionary();
    blockActions();
    state = loadState();
    render();
  </script>
</body>
</html>
