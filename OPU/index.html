<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>English Exam Trainer</title>
  <style>
    :root{
      --bg:#f7f1e7;
      --card:#fffaf0;
      --ink:#171310;
      --muted:#655b52;
      --line:#2b241f;
      --accent:#ff9f1c;
      --accent2:#ffd166;
      --good:#18794e;
      --bad:#b42318;
      --soft:#fff3d6;
      --shadow:0 10px 28px rgba(23,19,16,.12);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: radial-gradient(circle at top left, #fff4d9 0, var(--bg) 42%, #f2e3ce 100%);
      color:var(--ink);
      min-height:100vh;
    }
    .app{max-width:1180px;margin:0 auto;padding:18px 14px 44px}
    header{
      display:grid;
      grid-template-columns:1fr auto;
      gap:16px;
      align-items:center;
      padding:16px 0 10px;
    }
    h1{font-size:clamp(28px,5vw,56px);line-height:.95;margin:0;letter-spacing:-.04em}
    .subtitle{font-size:clamp(14px,2.1vw,18px);color:var(--muted);margin:10px 0 0;max-width:720px}
    .scoreBox{
      background:var(--card);border:2px solid var(--line);border-radius:var(--radius);padding:12px 14px;min-width:170px;box-shadow:var(--shadow)
    }
    .scoreBig{font-size:30px;font-weight:900;line-height:1}.scoreSmall{font-size:13px;color:var(--muted);margin-top:4px}
    nav{position:sticky;top:0;z-index:5;background:rgba(247,241,231,.88);backdrop-filter: blur(10px);padding:10px 0 12px;border-bottom:1px solid rgba(43,36,31,.14)}
    .tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
    button{font:inherit;color:inherit}
    .tab,.smallBtn,.answerBtn,.ticketBtn{
      border:2px solid var(--line);background:var(--card);border-radius:14px;padding:11px 12px;font-weight:800;cursor:pointer;box-shadow:0 3px 0 var(--line);transition:.12s transform,.12s box-shadow,.12s background
    }
    a.tab{display:flex;align-items:center;justify-content:center;text-decoration:none;text-align:center}
    .tab:hover,.smallBtn:hover,.answerBtn:hover,.ticketBtn:hover{transform:translateY(-1px);box-shadow:0 4px 0 var(--line)}
    .tab.active{background:var(--accent);}
    .grid{display:grid;grid-template-columns:330px 1fr;gap:16px;margin-top:16px;align-items:start}
    .panel{background:var(--card);border:2px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}
    .topicTitle{font-size:26px;line-height:1.05;margin:0 0 8px}.topicLead{color:var(--muted);margin:0 0 12px;line-height:1.45}
    .formula{background:var(--soft);border:2px solid var(--line);border-radius:14px;padding:12px;margin:12px 0;font-weight:750}
    .list{display:grid;gap:8px;margin-top:12px}.pill{border:1.5px solid var(--line);background:#fff;border-radius:12px;padding:9px 10px;line-height:1.3}.pill b{font-weight:900}.ru{color:var(--muted)}
    .controls{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.smallBtn{font-size:14px;padding:9px 11px;background:#fff}.smallBtn.primary{background:var(--accent2)}
    .taskTop{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}.badge{font-size:13px;border:2px solid var(--line);border-radius:999px;padding:5px 9px;background:var(--accent2);font-weight:900;white-space:nowrap}.taskNum{font-size:14px;color:var(--muted);font-weight:800}
    .prompt{font-size:clamp(22px,3.2vw,34px);line-height:1.15;font-weight:900;margin:8px 0 8px;letter-spacing:-.02em}.hint{font-size:15px;color:var(--muted);min-height:22px;margin:0 0 12px}.answers{display:grid;grid-template-columns:1fr 1fr;gap:10px}.answerBtn{text-align:left;background:#fff;min-height:58px;font-weight:850;line-height:1.2}.answerBtn.correct{background:#dff6ea;border-color:var(--good)}.answerBtn.wrong{background:#ffe0dc;border-color:var(--bad)}.answerBtn:disabled{cursor:default;transform:none;box-shadow:0 3px 0 var(--line);opacity:1}.feedback{margin-top:14px;border:2px solid var(--line);background:#fff;border-radius:14px;padding:12px;display:none;line-height:1.45}.feedback.good{display:block;border-color:var(--good)}.feedback.bad{display:block;border-color:var(--bad)}.feedback b{font-weight:950}.bottomNav{display:flex;justify-content:space-between;gap:10px;margin-top:14px}.bottomNav .smallBtn{flex:1}.progressTrack{height:12px;border:2px solid var(--line);border-radius:999px;overflow:hidden;background:#fff;margin-top:12px}.progressFill{height:100%;width:0;background:var(--accent);transition:.25s width}.miniStats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.stat{border:1.5px solid var(--line);border-radius:12px;background:#fff;padding:9px;text-align:center}.stat b{display:block;font-size:20px}.stat span{font-size:12px;color:var(--muted)}
    .tickets{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.ticket{background:#fff;border:2px solid var(--line);border-radius:16px;padding:14px}.ticket h3{margin:0 0 9px;font-size:21px}.ticket ol{margin:0 0 12px 20px;padding:0;line-height:1.45}.sample{display:none;background:var(--soft);border:1.5px solid var(--line);border-radius:12px;padding:11px;line-height:1.45}.sample.open{display:block}.ticketBtn{background:var(--accent2);padding:8px 10px;font-size:14px;box-shadow:0 2px 0 var(--line)}
    .wordTable{display:grid;gap:7px}.row{display:grid;grid-template-columns:110px 1fr;border:1.5px solid var(--line);background:#fff;border-radius:11px;overflow:hidden}.row div{padding:8px}.row div:first-child{font-weight:900;background:var(--soft);border-right:1.5px solid var(--line)}

    .cw{cursor:help;border-radius:5px;padding:0 1px;transition:.12s background,.12s box-shadow}
    .cw:hover,.cw.active{background:var(--accent2);box-shadow:0 0 0 2px rgba(43,36,31,.12)}
    .wordPopup{position:fixed;z-index:50;display:none;max-width:min(330px,calc(100vw - 20px));background:#fff;border:2px solid var(--line);border-radius:15px;box-shadow:var(--shadow);padding:10px 12px;line-height:1.25}
    .wordPopup.open{display:block}
    .wpWord{font-weight:950;font-size:18px;margin-bottom:4px;overflow-wrap:anywhere}
    .wpTrans{color:var(--muted);font-size:15px;overflow-wrap:anywhere}
    .answerBtn .cw{position:relative;z-index:2}
    .hidden{display:none!important}
    @media (max-width:880px){header{grid-template-columns:1fr}.scoreBox{min-width:0}.grid{grid-template-columns:1fr}.tabs{grid-template-columns:1fr 1fr}.panel{padding:14px}.tickets{grid-template-columns:1fr}.wordTable .row{grid-template-columns:95px 1fr}}
    @media (max-width:520px){.app{padding:12px 10px 34px}.tabs{gap:7px}.tab{padding:10px 8px;font-size:14px}.answers{grid-template-columns:1fr}.prompt{font-size:25px}.bottomNav{position:sticky;bottom:8px}.bottomNav .smallBtn{background:#fff}.topicTitle{font-size:24px}.panel{border-radius:16px}.scoreBig{font-size:26px}}
    @media (prefers-reduced-motion: reduce){*{transition:none!important;scroll-behavior:auto!important}}
  </style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <h1>English Exam Trainer</h1>
      <p class="subtitle">Question words · Modal verbs · Description of a person</p>
    </div>
    <div class="scoreBox" aria-live="polite">
      <div class="scoreBig"><span id="totalScore">0</span>/<span id="totalDone">0</span></div>
      <div class="scoreSmall">correct answers</div>
    </div>
  </header>
  <nav>
    <div class="tabs" role="tablist">
      <button class="tab active" data-view="question_words">Question words</button>
      <button class="tab" data-view="modal_verbs">Modal verbs</button>
      <button class="tab" data-view="description_person">Description</button>
      <button class="tab" data-view="exam_tickets">Exam tickets</button>
      <a class="tab" href="dictionary.html">Dictionary</a>
    </div>
  </nav>
  <main id="main"></main>
</div>
<div class="wordPopup" id="wordPopup" role="status" aria-live="polite"></div>

const LEXICON = new Map();
DICTIONARY.forEach(item => {
  const key = normalizeLookup(item.Word);
  if(key && !LEXICON.has(key)) LEXICON.set(key, item);
});

function normalizeLookup(value){
  return String(value || '')
    .toLowerCase()
    .replace(/[’]/g, "'")
    .replace(/^[^a-z0-9]+|[^a-z0-9]+$/g, '')
    .trim();
}
function dictionaryEntryFor(key){
  key = normalizeLookup(key);
  if(!key) return null;
  return LEXICON.get(key) || null;
}
function clickableText(value){
  const text = String(value ?? '');
  const pattern = /([A-Za-z0-9]+(?:[’'][A-Za-z0-9]+)?)/g;
  let out = '';
  let last = 0;
  text.replace(pattern, (match, word, offset) => {
    out += escapeHtml(text.slice(last, offset));
    const key = normalizeLookup(word);
    out += `<span class="cw" data-word="${escapeHtml(word)}" data-key="${escapeHtml(key)}">${escapeHtml(word)}</span>`;
    last = offset + match.length;
    return match;
  });
  out += escapeHtml(text.slice(last));
  return out;
}
function siblingWord(span, direction){
  let node = span;
  while(node){
    node = direction === 'next' ? node.nextSibling : node.previousSibling;
    if(!node) return null;
    if(node.nodeType === 1 && node.classList && node.classList.contains('cw')) return node;
  }
  return null;
}
function findDictionaryMatch(span){
  const word = normalizeLookup(span.dataset.word);
  const next = siblingWord(span, 'next');
  const prev = siblingWord(span, 'prev');
  const nextWord = next ? normalizeLookup(next.dataset.word) : '';
  const prevWord = prev ? normalizeLookup(prev.dataset.word) : '';
  const candidates = [];
  if(word && nextWord) candidates.push(word + ' ' + nextWord);
  if(prevWord && word) candidates.push(prevWord + ' ' + word);
  if(word) candidates.push(word);
  for(const key of candidates){
    const entry = dictionaryEntryFor(key);
    if(entry) return {entry, key};
  }
  return null;
}
function showWordPopup(span, found){
  const popup = document.getElementById('wordPopup');
  document.querySelectorAll('.cw.active').forEach(x => x.classList.remove('active'));
  span.classList.add('active');
  const entry = found.entry;
  popup.innerHTML = `<div class="wpWord">${escapeHtml(entry.Emoji || '')} ${escapeHtml(entry.Word || found.key)}</div><div class="wpTrans">${escapeHtml(entry.Translation || '')}</div>`;
  popup.classList.add('open');
  const r = span.getBoundingClientRect();
  const margin = 10;
  const width = Math.min(330, window.innerWidth - margin * 2);
  popup.style.width = width + 'px';
  let left = Math.min(Math.max(margin, r.left), window.innerWidth - width - margin);
  let top = r.bottom + 8;
  popup.style.left = left + 'px';
  popup.style.top = top + 'px';
  const pr = popup.getBoundingClientRect();
  if(pr.bottom > window.innerHeight - margin){
    top = Math.max(margin, r.top - pr.height - 8);
    popup.style.top = top + 'px';
  }
}
function hideWordPopup(){
  const popup = document.getElementById('wordPopup');
  if(popup) popup.classList.remove('open');
  document.querySelectorAll('.cw.active').forEach(x => x.classList.remove('active'));
}
document.addEventListener('click', (event) => {
  const span = event.target.closest ? event.target.closest('.cw') : null;
  if(!span){ hideWordPopup(); return; }
  const found = findDictionaryMatch(span);
  if(!found) return;
  event.preventDefault();
  event.stopPropagation();
  showWordPopup(span, found);
}, true);
window.addEventListener('resize', hideWordPopup);

function save(){
  localStorage.setItem('examTrainerView', state.view);
  localStorage.setItem('examTrainerIndex_' + state.view, String(state.index));
  localStorage.setItem('examTrainerResults', JSON.stringify(state.results));
}
function topicQuestions(topic){
  const all = QUESTIONS.filter(q => q.topic === topic);
  if(!state.wrongOnly) return all;
  const wrong = all.filter((q, i) => state.results[keyFor(topic, i)] && !state.results[keyFor(topic, i)].correct);
  return wrong.length ? wrong : all;
}
function keyFor(topic, originalIndex){return topic + '_' + originalIndex}
function originalIndexOf(q){return QUESTIONS.filter(x => x.topic === q.topic).indexOf(q)}
function totalStats(){
  const values = Object.values(state.results);
  return {done: values.length, correct: values.filter(x => x.correct).length};
}
function updateScore(){
  const s = totalStats();
  document.getElementById('totalScore').textContent = s.correct;
  document.getElementById('totalDone').textContent = s.done;
}
function setView(view){
  state.view = view;
  state.index = Number(localStorage.getItem('examTrainerIndex_' + view) || 0);
  state.wrongOnly = false;
  state.answered = false;
  save();
  render();
}
function renderTabs(){
  document.querySelectorAll('.tab').forEach(btn => btn.classList.toggle('active', btn.dataset.view === state.view));
}
function render(){
  renderTabs(); updateScore();
  if(state.view === 'exam_tickets') return renderTickets();
  const main = document.getElementById('main');
  const topic = TOPICS[state.view];
  state.currentSet = topicQuestions(state.view);
  if(state.index >= state.currentSet.length) state.index = 0;
  const q = state.currentSet[state.index];
  const originalIndex = originalIndexOf(q);
  const topicAll = QUESTIONS.filter(x => x.topic === state.view);
  const topicDone = topicAll.filter((_, i) => state.results[keyFor(state.view, i)]).length;
  const topicCorrect = topicAll.filter((_, i) => state.results[keyFor(state.view, i)]?.correct).length;

        }).join('')}</div>
        <div class="list"><b>Exam examples</b>${topic.examples.map(e => `<div class="pill">${clickableText(e)}</div>`).join('')}</div>
        <div class="progressTrack"><div class="progressFill" style="width:${progress}%"></div></div>
        <div class="miniStats">
          <div class="stat"><b>${topicDone}/20</b><span>done</span></div>
          <div class="stat"><b>${topicCorrect}</b><span>correct</span></div>
        </div>
        <div class="controls">
          <button class="smallBtn primary" id="resetTopic">Reset topic</button>
          <button class="smallBtn" id="wrongOnly">${state.wrongOnly ? 'All tasks' : 'Train mistakes'}</button>
        </div>
      </aside>
      <section class="panel">
        <div class="taskTop">
          <div>
            <div class="taskNum">Task ${state.index + 1} / ${state.currentSet.length}${state.wrongOnly ? ' · mistakes' : ''}</div>
            <div class="prompt">${clickableText(q.prompt)}</div>
            <p class="hint">${q.ruHint ? clickableText('Focus: ' + q.ruHint) : ''}</p>
          </div>
          <div class="badge">${labelFor(q.type)}</div>
        </div>
        <div class="answers" id="answers">
          ${q.options.map(opt => `<button class="answerBtn" data-answer="${escapeHtml(opt)}">${clickableText(opt)}</button>`).join('')}
        </div>
        <div class="feedback" id="feedback"></div>
        <div class="bottomNav">
          <button class="smallBtn" id="prevBtn">Previous</button>
          <button class="smallBtn primary" id="nextBtn">Next</button>
        </div>
      </section>
    </section>`;
  document.getElementById('resetTopic').onclick = resetTopic;
  document.getElementById('wrongOnly').onclick = () => {state.wrongOnly = !state.wrongOnly; state.index = 0; state.answered = false; render();};
  document.getElementById('prevBtn').onclick = () => move(-1);
  document.getElementById('nextBtn').onclick = () => move(1);
  document.querySelectorAll('.answerBtn').forEach(btn => btn.onclick = () => answer(btn, q, originalIndex));
  const previous = state.results[keyFor(state.view, originalIndex)];
  if(previous) showPrevious(q, previous);
}
function labelFor(type){
  return ({choose:'choose', match:'answer → question', sentence:'sentence', exam:'exam', error:'fix', meaning:'meaning', context:'situation', appearance:'appearance', character:'character', category:'category', plan:'plan', vocab:'vocabulary'}[type] || type);
}
function answer(btn, q, originalIndex){
  const chosen = btn.dataset.answer;
  const correct = chosen === q.answer;
  state.results[keyFor(state.view, originalIndex)] = {chosen, correct};
  save(); updateScore();
  showPrevious(q, {chosen, correct});
}
function showPrevious(q, result){
  document.querySelectorAll('.answerBtn').forEach(b => {
    b.disabled = true;
    const val = b.dataset.answer;
    if(val === q.answer) b.classList.add('correct');
    if(val === result.chosen && val !== q.answer) b.classList.add('wrong');
  });
  const fb = document.getElementById('feedback');
  fb.className = 'feedback ' + (result.correct ? 'good' : 'bad');
  fb.innerHTML = result.correct ? `<b>Correct.</b> ${clickableText(q.note)}` : `<b>Correct answer: ${clickableText(q.answer)}</b><br>${clickableText(q.note)}`;
}
function move(delta){
  state.index = (state.index + delta + state.currentSet.length) % state.currentSet.length;
  state.answered = false; save(); render();
  window.scrollTo({top:0, behavior:'smooth'});
}
function resetTopic(){
  QUESTIONS.filter(q => q.topic === state.view).forEach((q, i) => delete state.results[keyFor(state.view, i)]);
  state.index = 0; state.wrongOnly = false; save(); render();
}

    <section class="panel" style="margin-top:16px">
      <h2 class="topicTitle">${clickableText("Exam tickets")}</h2>
      <p class="topicLead">${clickableText("Готовые карточки для устной практики. Каждая карточка объединяет все 3 темы: question words, modal verbs, description of a person.")}</p>
      <div class="tickets">
        ${TICKETS.map((t, i) => `<article class="ticket">
          <h3>${clickableText(t.title)}</h3>
          <ol>${t.tasks.map(x => `<li>${clickableText(x)}</li>`).join('')}</ol>
          <button class="ticketBtn" data-ticket="${i}">Sample answer</button>
          <div class="sample" id="sample_${i}">${clickableText(t.sample)}</div>
        </article>`).join('')}
      </div>
    </section>`;
  document.querySelectorAll('.ticketBtn').forEach(btn => btn.onclick = () => document.getElementById('sample_' + btn.dataset.ticket).classList.toggle('open'));
}
function escapeHtml(str){return String(str).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
document.querySelectorAll('.tab').forEach(btn => btn.onclick = () => setView(btn.dataset.view));
render();
</script>
</body>
</html>
